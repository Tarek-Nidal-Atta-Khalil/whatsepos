  function estQuU(t,i){const s=String(t||'').toLowerCase();return s[i]==='u'&&i>0&&s[i-1]==='q';}

function estUConsonansIntervocalicum(s,i,ctx={}){

  const s=sineMacris(String(syllaba||'')).toLowerCase();
  const i=indexUltimiVocalis(s);
  if(i<0)return[];
  return [...s.slice(i+1)].filter(c=>!estVocalis(c));

function ultimaSyllabaAnteVocalemBrevisFit(forma,sigla){
  const s=String(sigla||'').toUpperCase().replace(/[^LB]/g,'');
  const syllabae=syllabaeFormae(forma);
  if(!s||!syllabae.length)return false;

  const i=syllabae.length-1;
  const ultima=syllabae[i];

  if(s[i]!=='L')return false;
  if(syllabaNaturaliterLongaEst(forma,i))return false;

  return consonantes.length===1&&!['x','z'].includes(consonantes[0]);

    return `${s.slice(0,-1)}(${s.slice(-1)})`;

    cellae.forEach(html => {
      const cell = td(html);
      cell.className = 'verbum-nonfinitum';
      cell.colSpan = 2;
      tr.appendChild(cell);
    });

    tbody.appendChild(tr);
  }

  if (vox === 'pass') {
    addeRowSineTempore(
      'Gerundivum',
      formaInfinitaHtml(formae, 'gerundivum', null, 'pass')
    );

    addeRowSineTempore(
      'Supinum I',
      formaInfinitaHtml(formae, 'supinum_i')
    );

    addeRowSineTempore(
      'Supinum II',
      formaInfinitaHtml(formae, 'supinum_ii')
    );
  }

  const trHead = document.createElement('tr');

  const thLeer = document.createElement('th');
  thLeer.textContent = '';
  trHead.appendChild(thLeer);

  ['Praesens', 'Perfectum', 'Futurum'].forEach(textus => {
    const th = document.createElement('th');
    th.textContent = textus;
    th.colSpan = 2;
    trHead.appendChild(th);
  });

  tbody.appendChild(trHead);

  if (vox === 'act') {
    addeRow('Infinitivus', [
      formaInfinitaHtml(formae, 'infinitivus', 'praes', 'act'),
      formaInfinitaHtml(formae, 'infinitivus', 'perf', 'act'),
      formaInfinitaHtml(formae, 'infinitivus', 'fut', 'act')
    ]);

    addeRow('Participium', [
      formaInfinitaHtml(formae, 'participium', 'praes', 'act'),
      '—',
      formaInfinitaHtml(formae, 'participium', 'fut', 'act')
    ]);
  }

  if (vox === 'pass') {
    addeRow('Infinitivus', [
      formaInfinitaHtml(formae, 'infinitivus', 'praes', 'pass'),
      formaInfinitaHtml(formae, 'infinitivus', 'perf', 'pass'),
      formaInfinitaHtml(formae, 'infinitivus', 'fut', 'pass')
    ]);

    addeRow('Participium', [
      '—',
      formaInfinitaHtml(formae, 'participium', 'perf', 'pass'),
      '—'
    ]);
  }
}
  
function tabellaVerbi(formae) {
  const w = document.createElement('div');
  w.className = 'flexio-wrapper';

  function facTabellamVox(titulus, vox, addereInfinita = false) {
    const table = document.createElement('table');
    table.className = 'flexio-tabelle verbum-tabula';

    if (vox === 'pass') {
      table.style.marginTop = '28px';
    }

    const thead = document.createElement('thead');

    const trVox = document.createElement('tr');
    trVox.className = 'verbum-modus-row';

    const thVox = document.createElement('th');
    thVox.textContent = titulus;
    thVox.colSpan = 7;
    trVox.appendChild(thVox);

    thead.appendChild(trVox);

    const head = document.createElement('tr');
    ['', ...personae.map(p => p[2])].forEach(t => {
      const th = document.createElement('th');
      th.textContent = t;
      head.appendChild(th);
    });

    thead.appendChild(head);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');

    addeModus(tbody, 'Indicativus');
    [
      ['Praesens', 'praes'],
      ['Imperfectum', 'imperf'],
      ['Futurum', 'fut'],
      ['Perfectum', 'perf'],
      ['Plusquamperfectum', 'plqpf'],
      ['Futurum exactum', 'futperf']
    ].forEach(x => addeVerbum(tbody, formae, x[0], 'ind', x[1], vox));

    addeModus(tbody, 'Coniunctivus');
    [
      ['Praesens', 'praes'],
      ['Imperfectum', 'imperf'],
      ['Perfectum', 'perf'],
      ['Plusquamperfectum', 'plqpf']
    ].forEach(x => addeVerbum(tbody, formae, x[0], 'coni', x[1], vox));

    addeModus(tbody, 'Imperativus');
    [
      ['Praesens', 'praes'],
      ['Futurum', 'fut']
    ].forEach(x => addeVerbum(tbody, formae, x[0], 'imp', x[1], vox));

    if (addereInfinita) {
      addeFormaeInfinitae(tbody, formae, vox);
    }

    table.appendChild(tbody);
    return table;
  }

  w.appendChild(facTabellamVox('Vox activa', 'act', true));
  w.appendChild(facTabellamVox('Vox passiva', 'pass', true));

  return w;
}

function zeigeFlexio(formae){
  const z = document.getElementById('lemmaFlexio');
  z.innerHTML = '';

  if (!formae.length) {
    z.textContent = 'Nullae formae inventae sunt.';
    return;
  }

  const partes = new Set(formae.map(f => normalisierePars(f.pars_orationis)));

  const estParadigmaVerbale =
    partes.has('verbum') ||
    partes.has('verb') ||
    partes.has('infinitivus') ||
    partes.has('participium') ||
    partes.has('gerundivum') ||
    partes.has('supinum_i') ||
    partes.has('supinum_ii');

  if (estParadigmaVerbale) {
    z.appendChild(tabellaVerbi(formae));
    return;
  }

  if (partes.has('substantivum') || partes.has('subst')) {
    z.appendChild(tabellaSubstantivi(formae));
    return;
  }

  tabellaGenusNumerus(formae, 'sg').forEach(e => z.appendChild(e));
  tabellaGenusNumerus(formae, 'pl').forEach(e => z.appendChild(e));
}
  
function zeigeFormaeMetricae(formae) {
  const z = document.getElementById('lemmaFormae');
  z.innerHTML = '';

  if (!formae.length) {
    z.textContent = '—';
    return;
  }

  const lista = document.createElement('div');
  lista.className = 'formae-lista';

  const visa = new Set();

  const formaePraeparatae = [];

formae.forEach(raw => {
  const formaRoh = String(raw?.forma || '').trim();

  // Mehrwortformen wie "cantus esse", "cantum īrī" weiterhin nicht als Formenkarte
  if (!formaRoh || formaRoh.includes(' ')) return;

  const forma = formaCorrecta(raw);
  const syllabae = syllabaeFormae(forma);
  const habetSyllabas = syllabae.length > 0;

  const siglaRoh = habetSyllabas ? longaeSiglaMetricae(forma) : '';
  const textus = formaSignata(forma);
  const sigla = habetSyllabas ? siglaMitElisionEtLiaison(forma, siglaRoh, textus) : '';

  const clavis = [
    textus,
    forma.syllabae || '',
    sigla
  ].join('|');

  if (visa.has(clavis)) return;
  visa.add(clavis);

  const status = habetSyllabas
    ? (istHexameterCompatibilis(sigla) ? 'bona' : 'dubia')
    : 'incerta';

  formaePraeparatae.push({
    forma,
    textus,
    sigla,
    status,
    ordo: formaePraeparatae.length
  });
});

formaePraeparatae.sort((a, b) => {
  const ordoStatus = { bona: 0, dubia: 1, incerta: 2 };

  return (
    ordoStatus[a.status] - ordoStatus[b.status] ||
    a.textus.localeCompare(b.textus, 'la') ||
    a.ordo - b.ordo
  );
});

formaePraeparatae.forEach(({ forma, textus, sigla, status }) => {
  const habetSyllabas = syllabaeFormae(forma).length > 0;

  const card = document.createElement('div');

  card.className =
    'forma-card ' +
    (
      status === 'bona'
        ? 'forma-metrice-bona'
        : status === 'dubia'
          ? 'forma-metrice-dubia'
          : 'forma-metrice-incerta'
    );

  const prima = document.createElement('div');
  prima.className = 'forma-prima';
  prima.innerHTML = formaProLemmaHtml(forma);
  card.appendChild(prima);

  const meta = document.createElement('div');
  meta.className = 'forma-meta';

  if (habetSyllabas) {
    meta.textContent = [
      syllabaeDisplayFormae(forma),
      sigla ? `longae: ${sigla}` : ''
    ].filter(Boolean).join(' · ');
  } else {
    meta.textContent = 'syllabae nondum definitae';
  }

  card.appendChild(meta);

  if (habetSyllabas && estIambusCorreptibilis(forma)) {
    const v = document.createElement('span');
    v.className = 'forma-variante';
    v.textContent = `iambice: ${formaIambiceCorrepta(forma)}`;
    card.appendChild(v);
  }

  lista.appendChild(card);
});

  z.appendChild(lista);
}
  
async function lemmaExLexemeId(){if(lemma||!lexemeId)return;const{data,error}=await supabase.from('formae').select('lemma').eq('lexeme_id',lexemeId).limit(1);if(!error&&data&&data[0]?.lemma){lemma=data[0].lemma;lemmaDisplayActuale=lemma}}
async function ladeLemma(){await lemmaExLexemeId();if(!lemma&&!lexemeId)return;const lemmaNormal=normalisiere(lemma);document.getElementById('lemmaTitulus').textContent=lemma||'—';lemmaQuaere.value=lemma||'';const basis=supabase.from('formae').select('forma, lemma, pars_orationis, genus, numerus, casus, persona, tempus, modus, vox, syllabae, longae, lexeme_id');const query=lexemeId?basis.eq('lexeme_id',lexemeId):basis.ilike('lemma',lemmaNormal);const{data,error}=await query.order('forma',{ascending:true});if(error){document.getElementById('lemmaFlexio').textContent=error.message;return}const formae=(data||[]).map(formaCorrecta);const head=eligeFormamHeadword(formae);if(head){lemmaDisplayActuale=head.lemma||lemma;document.getElementById('lemmaTitulus').innerHTML=formaProLemmaHtml({...head,forma:lemmaDisplayActuale});document.getElementById('lemmaPars').textContent=head.pars_orationis||'—'}zeigeFlexio(formae);zeigeFormaeMetricae(formae);}
