  <style>
    .lemma-container{max-width:980px;margin:28px auto 80px;text-align:left}.lemma-topbar{display:flex;align-items:center;justify-content:flex-start;gap:34px;margin-bottom:24px}.lemma-revertere{position:fixed;left:26px;top:145px;z-index:40;display:inline-flex;align-items:center;gap:10px;padding:12px 18px;border-radius:999px;background:#fff;color:#6b21a8;text-decoration:none;font-size:20px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.08);white-space:nowrap}.lemma-revertere:hover{background:#faf5ff}#lemmaQuaere{width:560px;max-width:62vw;margin-left:120px;padding:14px 22px;font-size:22px;line-height:1.2;border-radius:20px;border:2px solid #d1d5db;background:#fff;box-shadow:0 6px 18px rgba(0,0,0,.06)}#lemmaQuaere:focus{outline:none;border-color:#93c5fd;box-shadow:0 0 0 4px rgba(147,197,253,.28),0 6px 18px rgba(0,0,0,.08)}.lemma-card{background:#fff;border-radius:28px;padding:50px 60px;box-shadow:0 10px 30px rgba(0,0,0,.06);text-align:left}.lemma-header{margin-bottom:40px;text-align:left}#lemmaTitulus{position:static;z-index:auto;background:transparent;padding:0;margin:0;font-size:72px;font-weight:700;text-align:left}#lemmaPars{margin-top:14px;font-size:30px;color:#6b7280;text-align:left}.lemma-section{margin-top:38px;text-align:left}.lemma-section h2{margin-bottom:12px;font-size:32px;text-align:left}.lemma-section p{margin:0;font-size:28px;line-height:1.7;text-align:left}.flexio-wrapper{overflow-x:auto;margin-top:14px}.flexio-tabelle{width:100%;border-collapse:collapse;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,.05)}.flexio-tabelle th,.flexio-tabelle td{padding:12px 14px;border:1px solid #e5e7eb;text-align:left;font-size:20px;white-space:nowrap}.flexio-tabelle th{background:#f3f4f6;color:#374151;font-weight:700}.flexio-tabelle td{color:#111827}.flexio-numerus{margin-top:22px;margin-bottom:10px;font-size:24px;font-weight:700;color:#4b5563}.formae-lista{display:flex;flex-direction:column;gap:12px;margin-top:12px}.forma-card{border:1px solid #e5e7eb;border-radius:18px;padding:14px 18px;background:#fff;text-align:left}.forma-prima{font-size:24px;font-weight:700}.forma-meta{margin-top:6px;font-size:17px;color:#6b7280;line-height:1.45}.forma-variante{display:inline-block;margin-top:6px;margin-right:8px;padding:4px 9px;border-radius:999px;background:#f3f4f6;font-size:17px;color:#374151}.verbum-tabula{table-layout:fixed}.verbum-tabula th:first-child,.verbum-tabula td:first-child{width:110px;font-weight:700}.verbum-tabula th:not(:first-child),.verbum-tabula td:not(:first-child){width:calc((100% - 110px) / 6)}.diphthongus{position:relative!important;display:inline-block!important;line-height:1!important;padding-top:0!important}.diphthongus::before{content:""!important;position:absolute!important;left:.10em!important;right:.10em!important;top:.06em!important;border-top:.055em solid currentColor!important;border-radius:999px!important;opacity:1!important;transform:none!important}

<body>
  <h1>Uocabularium</h1>
  <a href="index.html?tab=vocabularium" class="lemma-revertere">← Retro</a>
  <div class="container lemma-container">
    <div class="lemma-topbar"><input id="lemmaQuaere" type="search" placeholder="Aliud verbum quaere"></div>
    <article class="lemma-card">
      <header class="lemma-header"><h1 id="lemmaTitulus">—</h1><p id="lemmaPars">—</p></header>
      <section class="lemma-section"><h2>Flexio</h2><div id="lemmaFlexio">Tabula nondum onerata est.</div></section>
      <section class="lemma-section"><h2>Formae metricae</h2><div id="lemmaFormae">—</div></section>
      <section class="lemma-section"><h2>Syllabae</h2><p id="lemmaSyllabae">—</p></section>
      <section class="lemma-section"><h2>IPA</h2><p id="lemmaIpa">—</p></section>
      <section class="lemma-section"><h2>Compatibilitas metrica</h2><p class="lemma-metrica bona">✔ hexameter compatibile</p></section>
    </article>
  </div>
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const supabase=createClient("https://sdjhpovsechtfdwwakmm.supabase.co","sb_publishable_HZQ-cYsIytBAD899kSCMag_I32Qeabd");
    const params=new URLSearchParams(window.location.search); const lemma=params.get('lemma')||''; const lexemeId=params.get('lexeme_id')||'';const lemmaQuaere=document.getElementById('lemmaQuaere');let lemmaDisplayActuale=lemma;
    const breves={a:'ă',e:'ĕ',i:'ĭ',o:'ŏ',u:'ŭ',y:'y̆',A:'Ă',E:'Ĕ',I:'Ĭ',O:'Ŏ',U:'Ŭ',Y:'Y̆'};
    const longaeNotae={a:'ā',e:'ē',i:'ī',o:'ō',u:'ū',y:'ȳ',A:'Ā',E:'Ē',I:'Ī',O:'Ō',U:'Ū',Y:'Ȳ'};
    const vocales='aeiouyAEIOUYāēīōūȳĀĒĪŌŪȲ';const diphthongi=['ae','au','oe','eu'];
    const casusOrdines=['nom','gen','dat','acc','abl','voc'];const casusNomina={nom:'Nom.',gen:'Gen.',dat:'Dat.',acc:'Acc.',abl:'Abl.',voc:'Voc.'};
    function escapeHtml(t){return String(t||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
    function sineMacris(t){return String(t||'').replace(/[āăáàâä]/g,'a').replace(/[ēĕéèêë]/g,'e').replace(/[īĭíìîï]/g,'i').replace(/[ōŏóòôö]/g,'o').replace(/[ūŭúùûü]/g,'u').replace(/[ȳýỳŷÿ]/g,'y').replace(/[ĀĂÁÀÂÄ]/g,'A').replace(/[ĒĔÉÈÊË]/g,'E').replace(/[ĪĬÍÌÎÏ]/g,'I').replace(/[ŌŎÓÒÔÖ]/g,'O').replace(/[ŪŬÚÙÛÜ]/g,'U').replace(/[ȲÝỲŶŸ]/g,'Y');}
    function normalisiere(t){return sineMacris(t).trim().toLowerCase().replace(/j/g,'i').replace(/v/g,'u');}
    function estVocalis(c){return vocales.includes(c||'');}
    function estDiphthongus(t,i){const s=sineMacris(t).toLowerCase();const duo=s.slice(i,i+2);if(!diphthongi.includes(duo))return false;if((duo==='au'||duo==='eu')&&estVocalis(s[i+2]))return false;return true;}
    function indexUltimiVocalis(t){for(let i=String(t||'').length-1;i>=0;i-=1){if(estVocalis(t[i]))return i;}return-1;}
    function syllabaClausaEst(syllaba){const s=sineMacris(syllaba).toLowerCase();const i=indexUltimiVocalis(s);if(i<0)return false;return[...s.slice(i+1)].some(c=>!estVocalis(c));}
    function syllabaDiphthongoLongaEst(syllaba){const s=sineMacris(syllaba).toLowerCase();for(let i=0;i<s.length-1;i+=1){if(estDiphthongus(s,i))return true;}return false;}
    function syllabaMacronLongaEst(syllaba){return/[āēīōūȳĀĒĪŌŪȲ]/.test(String(syllaba||''));}
    function longaeIndices(forma){if(Array.isArray(forma?.longae))return forma.longae.map(Number).filter(n=>Number.isInteger(n));return String(forma?.longae||'').toUpperCase().replace(/[.\s-]/g,'').split('').map((s,i)=>s==='L'?i:null).filter(i=>i!==null);}
    function estUConsonansIntervocalicum(s,i,contextus={}){const t=sineMacris(String(s||'')).toLowerCase();if(t[i]!=='u'||i!==0||!estVocalis(t[i+1]))return false;const p=sineMacris(String(contextus.praecedens||'')).toLowerCase();return Boolean(p&&estVocalis(p[p.length-1]));}
    function indexSignandiVocalis(t,contextus={}){const s=String(t||'');for(let i=0;i<s.length;i+=1){if(estUConsonansIntervocalicum(s,i,contextus))continue;if(estVocalis(s[i]))return i;}return-1;}
    function notaLongaText(syllaba,contextus={}){const i=indexSignandiVocalis(syllaba,contextus);if(i<0)return syllaba;if(estDiphthongus(syllaba,i))return syllaba.slice(0,i)+syllaba[i]+'͞'+syllaba[i+1]+syllaba.slice(i+2);return syllaba.slice(0,i)+(longaeNotae[syllaba[i]]||syllaba[i])+syllaba.slice(i+1);}
    function notaLongaHtml(syllaba,contextus={}){const i=indexSignandiVocalis(syllaba,contextus);if(i<0)return escapeHtml(syllaba);if(estDiphthongus(syllaba,i))return escapeHtml(syllaba.slice(0,i))+`<span class="diphthongus">${escapeHtml(syllaba[i]+syllaba[i+1])}</span>`+escapeHtml(syllaba.slice(i+2));return escapeHtml(syllaba.slice(0,i)+(longaeNotae[syllaba[i]]||syllaba[i])+syllaba.slice(i+1));}
    function estLauinia(forma){return normalisiere(forma?.lemma||lemma)==='lauinia'||normalisiere(forma?.forma||'').startsWith('lauini')||normalisiere(lemma)==='lauinia';}
    function formaCorrecta(forma){const f={...forma};if(estLauinia(f)){if(!String(f.syllabae||'').startsWith('la.ui'))f.syllabae='la.ui.ni.a';const indices=new Set(longaeIndices(f));indices.add(0);indices.add(1);f.longae=[...indices].sort((a,b)=>a-b);}return f;}
    function longaeSiglaMetricae(forma){forma=formaCorrecta(forma);const syllabae=String(forma?.syllabae||'').split('.').filter(Boolean);const dataLongae=new Set(longaeIndices(forma));return syllabae.map((s,i)=>(dataLongae.has(i)||syllabaClausaEst(s)||syllabaDiphthongoLongaEst(s)||syllabaMacronLongaEst(s))?'L':'B').join('');}
    function longaeSiglaSignandae(forma){forma=formaCorrecta(forma);const syllabae=String(forma?.syllabae||'').split('.').filter(Boolean);const dataLongae=new Set(longaeIndices(forma));return syllabae.map((s,i)=>(dataLongae.has(i)||syllabaDiphthongoLongaEst(s)||syllabaMacronLongaEst(s))?'L':'B').join('');}
    function formaSignata(forma){forma=formaCorrecta(forma);if(estLauinia(forma)&&normalisiere(forma?.forma||forma?.lemma||lemma)==='lauinia')return 'Lāuīnia';const syllabae=String(forma?.syllabae||'').split('.').filter(Boolean);if(!syllabae.length)return String(forma?.forma||forma?.lemma||'');const signandae=longaeSiglaSignandae(forma);return syllabae.map((s,i)=>signandae[i]==='L'?notaLongaText(s,{praecedens:syllabae[i-1]||''}):s).join('');}
    function formaSignataHtml(forma){   forma=formaCorrecta(forma);   const syllabae=String(forma?.syllabae||'').split('.').filter(Boolean);   let html=syllabae.length     ? syllabae.map((s,i)=>longaeSiglaSignandae(forma)[i]==='L'?notaLongaHtml(s,{praecedens:syllabae[i-1]||''}):escapeHtml(s)).join('')     : escapeHtml(forma?.forma||forma?.lemma||'');    if (/^[A-ZĀĒĪŌŪȲ]/.test(forma?.lemma||lemma||'')) {     html = html.charAt(0).toUpperCase() + html.slice(1);   }    return html; }
    function estNomenProprium(){return/^[A-ZĀĒĪŌŪȲ]/.test(lemmaDisplayActuale||'');}
    function formaProLemma(forma){   const textus=formaSignata(forma);   if(!textus)return '—';   if(estNomenProprium())return textus.charAt(0).toUpperCase()+textus.slice(1);   return textus; }
    function formaProLemmaHtml(forma){const html=formaSignataHtml(forma);return html||'—';}
    function breviaSyllabam(syllaba){return String(syllaba||'').replace(/[aeiouyAEIOUY]/,l=>breves[l]||l);}
    function estIambusCorreptibilis(forma){const syllabae=String(forma?.syllabae||'').split('.').filter(Boolean);return syllabae.length===2&&longaeSiglaMetricae(forma)==='BL';}
    function formaIambiceCorrepta(forma){const syllabae=String(forma?.syllabae||'').split('.').filter(Boolean);if(syllabae.length!==2)return'';return syllabae[0]+breviaSyllabam(syllabae[1]);}
    function eligeFormamHeadword(formae){const lemmaNorm=normalisiere(lemma);return formae.find(f=>f.pars_orationis==='substantivum'&&f.casus==='nom'&&f.numerus==='sg')||formae.find(f=>f.pars_orationis==='substantivum'&&f.casus==='nom'&&f.numerus==='pl')||formae.find(f=>f.persona==='1'&&f.numerus==='sg'&&f.tempus==='praes'&&f.modus==='ind'&&f.vox==='act')||formae.find(f=>normalisiere(f.forma)===lemmaNorm)||formae[0];}
    function formaSubstantiviHtml(formae,casus,numerus){const f=formae.find(x=>x.casus===casus&&x.numerus===numerus);return f?formaProLemmaHtml(f):'—';}
    function numeriSubstantivi(formae){const sg=formae.some(f=>f.numerus==='sg');const pl=formae.some(f=>f.numerus==='pl');if(sg&&pl)return['sg','pl'];if(pl)return['pl'];return['sg'];}
    function tabellaSubstantivi(formae){const wrapper=document.createElement('div');wrapper.className='flexio-wrapper';const table=document.createElement('table');table.className='flexio-tabelle substantivum-tabula';const numeri=numeriSubstantivi(formae);const thead=document.createElement('thead');const head=document.createElement('tr');['',...numeri.map(n=>n==='sg'?'Singularis':'Pluralis')].forEach(t=>{const th=document.createElement('th');th.textContent=t;head.appendChild(th);});thead.appendChild(head);table.appendChild(thead);const tbody=document.createElement('tbody');casusOrdines.forEach(casus=>{const tr=document.createElement('tr');const th=document.createElement('th');th.textContent=casusNomina[casus];tr.appendChild(th);numeri.forEach(numerus=>{const td=document.createElement('td');td.innerHTML=formaSubstantiviHtml(formae,casus,numerus);tr.appendChild(td);});tbody.appendChild(tr);});table.appendChild(tbody);wrapper.appendChild(table);return wrapper;}
    function formaNachMetaHtml(formae,casus,numerus,genus){const f=formae.find(x=>x.casus===casus&&x.numerus===numerus&&x.genus===genus);return f?formaProLemmaHtml(f):'—';}
    function tabellaAdiectiviNumeri(formae,numerus){const h=document.createElement('h3');h.className='flexio-numerus';h.textContent=numerus==='sg'?'Singularis':'Pluralis';const wrapper=document.createElement('div');wrapper.className='flexio-wrapper';const table=document.createElement('table');table.className='flexio-tabelle';const thead=document.createElement('thead');const head=document.createElement('tr');['','masculinum','femininum','neutrum'].forEach(t=>{const th=document.createElement('th');th.textContent=t;head.appendChild(th);});thead.appendChild(head);table.appendChild(thead);const tbody=document.createElement('tbody');casusOrdines.forEach(casus=>{const tr=document.createElement('tr');const th=document.createElement('th');th.textContent=casusNomina[casus];tr.appendChild(th);['m','f','n'].forEach(genus=>{const td=document.createElement('td');td.innerHTML=formaNachMetaHtml(formae,casus,numerus,genus);tr.appendChild(td);});tbody.appendChild(tr);});table.appendChild(tbody);wrapper.appendChild(table);return[h,wrapper];}
    const personae=[['1','sg','1. Sg.'],['2','sg','2. Sg.'],['3','sg','3. Sg.'],['1','pl','1. Pl.'],['2','pl','2. Pl.'],['3','pl','3. Pl.']];const tempora=['praes','imperf','fut','perf','plqpf','futperf'];const temporaNomina={praes:'Praesens',imperf:'Imperfectum',fut:'Futurum',perf:'Perfectum',plqpf:'Plusquamperfectum',futperf:'Futurum exactum'};
    function formaVerbalisHtml(formae,persona,numerus,tempus){const f=formae.find(x=>x.persona===persona&&x.numerus===numerus&&x.tempus===tempus&&(!x.modus||x.modus==='ind')&&(!x.vox||x.vox==='act'));return f?formaProLemmaHtml(f):'—';}
    function tabellaVerbi(formae){const wrapper=document.createElement('div');wrapper.className='flexio-wrapper';const table=document.createElement('table');table.className='flexio-tabelle verbum-tabula';const thead=document.createElement('thead');const head=document.createElement('tr');['',...tempora.map(t=>temporaNomina[t]||t)].forEach(t=>{const th=document.createElement('th');th.textContent=t;head.appendChild(th);});thead.appendChild(head);table.appendChild(thead);const tbody=document.createElement('tbody');personae.forEach(([persona,numerus,label])=>{const tr=document.createElement('tr');const th=document.createElement('th');th.textContent=label;tr.appendChild(th);tempora.forEach(tempus=>{const td=document.createElement('td');td.innerHTML=formaVerbalisHtml(formae,persona,numerus,tempus);tr.appendChild(td);});tbody.appendChild(tr);});table.appendChild(tbody);wrapper.appendChild(table);return wrapper;}
    function zeigeFlexio(formae){const ziel=document.getElementById('lemmaFlexio');ziel.innerHTML='';if(!formae.length){ziel.textContent='Nullae formae inventae sunt.';return;}const pars=formae[0]?.pars_orationis;if(pars==='substantivum'){ziel.appendChild(tabellaSubstantivi(formae));return;}if(pars==='verbum'){ziel.appendChild(tabellaVerbi(formae));return;}tabellaAdiectiviNumeri(formae,'sg').forEach(el=>ziel.appendChild(el));tabellaAdiectiviNumeri(formae,'pl').forEach(el=>ziel.appendChild(el));}
    function zeigeFormaeMetricae(formae){const ziel=document.getElementById('lemmaFormae');ziel.innerHTML='';if(!formae.length){ziel.textContent='—';return;}const lista=document.createElement('div');lista.className='formae-lista';const visa=new Set();formae.forEach(forma=>{forma=formaCorrecta(forma);const sigla=longaeSiglaMetricae(forma);const clavis=[forma.forma,forma.syllabae,sigla].join('|');if(visa.has(clavis))return;visa.add(clavis);const card=document.createElement('div');card.className='forma-card';const prima=document.createElement('div');prima.className='forma-prima';prima.innerHTML=formaProLemmaHtml(forma);card.appendChild(prima);const meta=document.createElement('div');meta.className='forma-meta';meta.textContent=[forma.syllabae,sigla?`longae: ${sigla}`:''].filter(Boolean).join(' · ');card.appendChild(meta);if(estIambusCorreptibilis(forma)){const varians=document.createElement('span');varians.className='forma-variante';varians.textContent=`iambice: ${formaIambiceCorrepta(forma)}`;card.appendChild(varians);}lista.appendChild(card);});ziel.appendChild(lista);}
    async function ladeLemma(){if(!lemma)return;const lemmaNormal=normalisiere(lemma);document.getElementById('lemmaTitulus').textContent=lemma;lemmaQuaere.value=lemma;const basisQuery=supabase.from('formae').select('forma, lemma, pars_orationis, genus, numerus, casus, persona, tempus, modus, vox, syllabae, longae, lexeme_id');
const query=lexemeId ? basisQuery.eq('lexeme_id',lexemeId) : basisQuery.ilike('lemma',lemmaNormal);
const{data,error}=await query.order('forma',{ascending:true});if(error){document.getElementById('lemmaFlexio').textContent=error.message;return;}const formae=(data||[]).map(formaCorrecta);const headword=eligeFormamHeadword(formae);if(headword){lemmaDisplayActuale=headword.lemma||lemma;document.getElementById('lemmaTitulus').innerHTML=formaProLemmaHtml({...headword,forma:lemmaDisplayActuale});document.getElementById('lemmaPars').textContent=headword.pars_orationis||'—';document.getElementById('lemmaSyllabae').textContent=headword.syllabae||'—';}zeigeFlexio(formae);zeigeFormaeMetricae(formae);}
    lemmaQuaere.addEventListener('keydown',e=>{if(e.key!=='Enter')return;e.preventDefault();const q=lemmaQuaere.value.trim();if(!q)return;window.location.href=`index.html?tab=vocabularium&q=${encodeURIComponent(q)}`;});
    ladeLemma();
  </script>
