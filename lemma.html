<!DOCTYPE html>
<html lang="la">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lemma – Whatsepos</title>
  <link rel="stylesheet" href="style.css?v=20260523-lemma-9">
  <style>
    .lemma-container{max-width:980px;margin:28px auto 80px;text-align:left}
    .lemma-topbar{display:flex;align-items:center;justify-content:flex-start;gap:34px;margin-bottom:24px}
    .lemma-revertere{position:fixed;left:26px;top:145px;z-index:40;display:inline-flex;align-items:center;gap:10px;padding:12px 18px;border-radius:999px;background:#ffffff;color:#6b21a8;text-decoration:none;font-size:20px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.08);transition:all .18s ease;white-space:nowrap}
    .lemma-revertere:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(0,0,0,.12);background:#faf5ff}
    #lemmaQuaere{width:560px;max-width:62vw;margin-left:120px;padding:14px 22px;font-size:22px;line-height:1.2;border-radius:20px;border:2px solid #d1d5db;background:#fff;box-shadow:0 6px 18px rgba(0,0,0,.06)}
    #lemmaQuaere:focus{outline:none;border-color:#93c5fd;box-shadow:0 0 0 4px rgba(147,197,253,.28),0 6px 18px rgba(0,0,0,.08)}
    .lemma-card{background:#fff;border-radius:28px;padding:50px 60px;box-shadow:0 10px 30px rgba(0,0,0,.06);text-align:left}
    .lemma-header{margin-bottom:40px;text-align:left}
    #lemmaTitulus{position:static;z-index:auto;background:transparent;padding:0;margin:0;font-size:72px;font-weight:700;text-align:left}
    #lemmaPars{margin-top:14px;font-size:30px;color:#6b7280;text-align:left}
    .lemma-section{margin-top:38px;text-align:left}
    .lemma-section h2{margin-bottom:12px;font-size:32px;text-align:left}
    .lemma-section p{margin:0;font-size:28px;line-height:1.7;text-align:left}
    .lemma-metrica-bona{color:#166534;font-weight:700}
    .flexio-wrapper{overflow-x:auto;margin-top:14px}
    .flexio-tabelle{width:100%;border-collapse:collapse;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,.05)}
    .flexio-tabelle th,.flexio-tabelle td{padding:12px 14px;border:1px solid #e5e7eb;text-align:left;font-size:20px;white-space:nowrap}
    .flexio-tabelle th{background:#f3f4f6;color:#374151;font-weight:700}
    .flexio-tabelle td{color:#111827}
    .flexio-numerus{margin-top:22px;margin-bottom:10px;font-size:24px;font-weight:700;color:#4b5563}
    .formae-lista{display:flex;flex-direction:column;gap:12px;margin-top:12px}
    .forma-card{border:1px solid #e5e7eb;border-radius:18px;padding:14px 18px;background:#fff;text-align:left}
    .forma-prima{font-size:24px;font-weight:700}
    .forma-meta{margin-top:6px;font-size:17px;color:#6b7280;line-height:1.45}
    .forma-variante{display:inline-block;margin-top:6px;margin-right:8px;padding:4px 9px;border-radius:999px;background:#f3f4f6;font-size:17px;color:#374151}
    .verbum-tabula {
      table-layout: fixed;
    }
    
    .verbum-tabula th:first-child,
    .verbum-tabula td:first-child {
      width: 110px;
      font-weight: 700;
    }
    
    .verbum-tabula th:not(:first-child),
    .verbum-tabula td:not(:first-child) {
      width: calc((100% - 110px) / 6);
    }
  </style>
</head>
<body>
  <h1>Uocabularium</h1>
  <a href="index.html?tab=vocabularium" class="lemma-revertere">← Retro</a>

  <div class="container lemma-container">
    <div class="lemma-topbar">
      <input id="lemmaQuaere" type="search" placeholder="Aliud verbum quaere">
    </div>

    <article class="lemma-card">
      <header class="lemma-header">
        <h1 id="lemmaTitulus">Lātīnus</h1>
        <p id="lemmaPars">adiectivum</p>
      </header>

      <section class="lemma-section">
        <h2>Flexio</h2>
        <div id="lemmaFlexio">Tabula nondum onerata est.</div>
      </section>

      <section class="lemma-section">
        <h2>Formae metricae</h2>
        <div id="lemmaFormae">—</div>
      </section>

      <section class="lemma-section">
        <h2>Syllabae</h2>
        <p id="lemmaSyllabae">—</p>
      </section>

      <section class="lemma-section">
        <h2>IPA</h2>
        <p id="lemmaIpa">—</p>
      </section>

      <section class="lemma-section">
        <h2>Compatibilitas metrica</h2>
        <p class="lemma-metrica bona">✔ hexameter compatibile</p>
      </section>
    </article>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    import { formaSupabaseSignata } from "./hexameter_active.js?v=20260525-macra-1";

    const supabase = createClient(
      "https://sdjhpovsechtfdwwakmm.supabase.co",
      "sb_publishable_HZQ-cYsIytBAD899kSCMag_I32Qeabd"
    );

    const params = new URLSearchParams(window.location.search);
    const lemma = params.get('lemma');
    const lemmaQuaere = document.getElementById('lemmaQuaere');
    let lemmaDisplayActuale = lemma || '';

    const breves = { a:'ă', e:'ĕ', i:'ĭ', o:'ŏ', u:'ŭ', y:'y̆', A:'Ă', E:'Ĕ', I:'Ĭ', O:'Ŏ', U:'Ŭ', Y:'Y̆' };

    function normalisiere(textus) {
      return String(textus || '').trim().toLowerCase()
        .replace(/[āăáàâä]/g, 'a')
        .replace(/[ēĕéèêë]/g, 'e')
        .replace(/[īĭíìîï]/g, 'i')
        .replace(/[ōŏóòôö]/g, 'o')
        .replace(/[ūŭúùûü]/g, 'u')
        .replace(/[ȳýỳŷÿ]/g, 'y')
        .replace(/j/g, 'i').replace(/v/g, 'u');
    }

    function estNomenProprium() {
      return /^[A-ZĀĒĪŌŪȲ]/.test(lemmaDisplayActuale || '');
    }

    function breviaSyllabam(syllaba) {
      return String(syllaba || '').replace(/[aeiouyAEIOUY]/, l => breves[l] || l);
    }

    function longaeIndices(forma) {
      if (Array.isArray(forma?.longae)) {
        return forma.longae.map(Number).filter(n => Number.isInteger(n));
      }
      return String(forma?.longae || '').toUpperCase().replace(/[.\s-]/g, '').split('')
        .map((s, i) => s === 'L' ? i : null).filter(i => i !== null);
    }

    function estIambusCorreptibilis(forma) {
      const syllabae = String(forma?.syllabae || '').split('.').filter(Boolean);
      const longae = new Set(longaeIndices(forma));
      return syllabae.length === 2 && !longae.has(0) && longae.has(1);
    }

    function formaIambiceCorrepta(forma) {
      const syllabae = String(forma?.syllabae || '').split('.').filter(Boolean);
      if (syllabae.length !== 2) return '';
      return syllabae[0] + breviaSyllabam(syllabae[1]);
    }

    function formaProLemma(forma) {
      const textus = formaSupabaseSignata(forma);
      if (!estNomenProprium() || !textus) return textus || '—';
      return textus.charAt(0).toUpperCase() + textus.slice(1);
    }

    function eligeFormamHeadword(formae) {
      const lemmaNorm = normalisiere(lemma || '');
      return formae.find(f => normalisiere(f.forma) === lemmaNorm)
        || formae.find(f => f.persona === '1' && f.numerus === 'sg' && f.tempus === 'praes' && f.modus === 'ind' && f.vox === 'act')
        || formae[0];
    }

    const casusOrdines = ['nom', 'gen', 'dat', 'acc', 'abl', 'voc'];
    const casusNomina = { nom: 'Nom.', gen: 'Gen.', dat: 'Dat.', acc: 'Acc.', abl: 'Abl.', voc: 'Voc.' };

    function formaNachMeta(formae, casus, numerus, genus) {
      const inventa = formae.find(f => f.casus === casus && f.numerus === numerus && f.genus === genus);
      return inventa ? formaProLemma(inventa) : '—';
    }

    function formaSubstantivi(formae, casus, numerus) {
      const inventa = formae.find(f => f.casus === casus && f.numerus === numerus);
      return inventa ? formaProLemma(inventa) : '—';
    }

    function tabellaAdiectiviNumeri(formae, numerus) {
      const h = document.createElement('h3');
      h.className = 'flexio-numerus';
      h.textContent = numerus === 'sg' ? 'Singularis' : 'Pluralis';
      const wrapper = document.createElement('div');
      wrapper.className = 'flexio-wrapper';
      const table = document.createElement('table');
      table.className = 'flexio-tabelle';
      const thead = document.createElement('thead');
      const head = document.createElement('tr');
      ['', 'masculinum', 'femininum', 'neutrum'].forEach(text => {
        const th = document.createElement('th'); th.textContent = text; head.appendChild(th);
      });
      thead.appendChild(head); table.appendChild(thead);
      const tbody = document.createElement('tbody');
      casusOrdines.forEach(casus => {
        const tr = document.createElement('tr');
        const th = document.createElement('th'); th.textContent = casusNomina[casus]; tr.appendChild(th);
        ['m', 'f', 'n'].forEach(genus => {
          const td = document.createElement('td'); td.textContent = formaNachMeta(formae, casus, numerus, genus); tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody); wrapper.appendChild(table); return [h, wrapper];
    }

    function tabellaSubstantivi(formae) {
      const wrapper = document.createElement('div'); wrapper.className = 'flexio-wrapper';
      const table = document.createElement('table'); table.className = 'flexio-tabelle substantivum-tabula';
      const hatPlural = !estNomenProprium() && formae.some(f => f.numerus === 'pl');
      const numeri = hatPlural ? ['sg', 'pl'] : ['sg'];
      const numerusTituli = hatPlural ? ['Singularis', 'Pluralis'] : ['Singularis'];
      const thead = document.createElement('thead'); const head = document.createElement('tr');
      ['', ...numerusTituli].forEach(text => { const th = document.createElement('th'); th.textContent = text; head.appendChild(th); });
      thead.appendChild(head); table.appendChild(thead);
      const tbody = document.createElement('tbody');
      casusOrdines.forEach(casus => {
        const tr = document.createElement('tr'); const th = document.createElement('th'); th.textContent = casusNomina[casus]; tr.appendChild(th);
        numeri.forEach(numerus => { const td = document.createElement('td'); td.textContent = formaSubstantivi(formae, casus, numerus); tr.appendChild(td); });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody); wrapper.appendChild(table); return wrapper;
    }

    const personae = [
      ['1','sg','1. Sg.'], ['2','sg','2. Sg.'], ['3','sg','3. Sg.'],
      ['1','pl','1. Pl.'], ['2','pl','2. Pl.'], ['3','pl','3. Pl.']
    ];
    const tempora = ['praes', 'imperf', 'fut', 'perf', 'plqpf', 'futperf'];
    const temporaNomina = { praes:'Praesens', imperf:'Imperfectum', fut:'Futurum', perf:'Perfectum', plqpf:'Plusquamperfectum', futperf:'Futurum exactum' };

    function formaVerbalis(formae, persona, numerus, tempus) {
      const inventa = formae.find(f => f.persona === persona && f.numerus === numerus && f.tempus === tempus && (!f.modus || f.modus === 'ind') && (!f.vox || f.vox === 'act'));
      return inventa ? formaProLemma(inventa) : '—';
    }

    function tabellaVerbi(formae) {
      const wrapper = document.createElement('div'); wrapper.className = 'flexio-wrapper';
      const table = document.createElement('table'); table.className = 'flexio-tabelle verbum-tabula';
      const thead = document.createElement('thead'); const head = document.createElement('tr');
      ['', ...tempora.map(t => temporaNomina[t] || t)].forEach(text => { const th = document.createElement('th'); th.textContent = text; head.appendChild(th); });
      thead.appendChild(head); table.appendChild(thead);
      const tbody = document.createElement('tbody');
      personae.forEach(([persona, numerus, label]) => {
        const tr = document.createElement('tr'); const th = document.createElement('th'); th.textContent = label; tr.appendChild(th);
        tempora.forEach(tempus => { const td = document.createElement('td'); td.textContent = formaVerbalis(formae, persona, numerus, tempus); tr.appendChild(td); });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody); wrapper.appendChild(table); return wrapper;
    }

    function zeigeFlexio(formae) {
      const ziel = document.getElementById('lemmaFlexio');
      ziel.innerHTML = '';
      if (!formae.length) { ziel.textContent = 'Nullae formae inventae sunt.'; return; }
      const pars = formae[0]?.pars_orationis;
      if (pars === 'substantivum') { ziel.appendChild(tabellaSubstantivi(formae)); return; }
      if (pars === 'verbum') { ziel.appendChild(tabellaVerbi(formae)); return; }
      tabellaAdiectiviNumeri(formae, 'sg').forEach(el => ziel.appendChild(el));
      tabellaAdiectiviNumeri(formae, 'pl').forEach(el => ziel.appendChild(el));
    }

    function zeigeFormaeMetricae(formae) {
      const ziel = document.getElementById('lemmaFormae');
      ziel.innerHTML = '';
      if (!formae.length) { ziel.textContent = '—'; return; }
      const lista = document.createElement('div'); lista.className = 'formae-lista';
      const visa = new Set();
      formae.forEach(forma => {
        const clavis = [forma.forma, forma.syllabae, forma.longae].join('|');
        if (visa.has(clavis)) return; visa.add(clavis);
        const card = document.createElement('div'); card.className = 'forma-card';
        const prima = document.createElement('div'); prima.className = 'forma-prima'; prima.textContent = formaProLemma(forma); card.appendChild(prima);
        const meta = document.createElement('div'); meta.className = 'forma-meta'; meta.textContent = [forma.syllabae, forma.longae ? `longae: ${forma.longae}` : ''].filter(Boolean).join(' · '); card.appendChild(meta);
        if (estIambusCorreptibilis(forma)) {
          const varians = document.createElement('span'); varians.className = 'forma-variante'; varians.textContent = `iambice: ${formaIambiceCorrepta(forma)}`; card.appendChild(varians);
        }
        lista.appendChild(card);
      });
      ziel.appendChild(lista);
    }

    async function ladeLemma() {
      if (!lemma) return;
      const lemmaNormal = normalisiere(lemma);
      document.getElementById('lemmaTitulus').textContent = lemma;
      lemmaQuaere.value = lemma;

      const { data, error } = await supabase
        .from('formae')
        .select('forma, lemma, pars_orationis, genus, numerus, casus, persona, tempus, modus, vox, syllabae, longae')
        .ilike('lemma', lemmaNormal)
        .order('forma', { ascending: true });

      if (error) { document.getElementById('lemmaFlexio').textContent = error.message; return; }

      const formae = data || [];
      const headword = eligeFormamHeadword(formae);

      if (headword) {
        lemmaDisplayActuale = headword.lemma || lemma;
        document.getElementById('lemmaTitulus').textContent = formaSupabaseSignata({ ...headword, forma: lemmaDisplayActuale });
        document.getElementById('lemmaPars').textContent = headword.pars_orationis || '—';
        document.getElementById('lemmaSyllabae').textContent = headword.syllabae || '—';
      }

      zeigeFlexio(formae);
      zeigeFormaeMetricae(formae);
    }

    lemmaQuaere.addEventListener('keydown', function(event) {
      if (event.key !== 'Enter') return;
      event.preventDefault();
      const q = lemmaQuaere.value.trim();
      if (!q) return;
      window.location.href = `index.html?tab=vocabularium&q=${encodeURIComponent(q)}`;
    });

    ladeLemma();
  </script>
</body>
</html>
