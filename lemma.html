    const breves={a:'ă',e:'ĕ',i:'ĭ',o:'ŏ',u:'ŭ',y:'y̆',A:'Ă',E:'Ĕ',I:'Ĭ',O:'Ŏ',U:'Ŭ',Y:'Y̆'};
    const longaeNotae={a:'ā',e:'ē',i:'ī',o:'ō',u:'ū',y:'ȳ',A:'Ā',E:'Ē',I:'Ī',O:'Ō',U:'Ū',Y:'Ȳ'};

    function escapeHtml(t){return String(t||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
    function sineMacris(t){return String(t||'').replace(/[āăáàâä]/g,'a').replace(/[ēĕéèêë]/g,'e').replace(/[īĭíìîï]/g,'i').replace(/[ōŏóòôö]/g,'o').replace(/[ūŭúùûü]/g,'u').replace(/[ȳýỳŷÿ]/g,'y').replace(/[ĀĂÁÀÂÄ]/g,'A').replace(/[ĒĔÉÈÊË]/g,'E').replace(/[ĪĬÍÌÎÏ]/g,'I').replace(/[ŌŎÓÒÔÖ]/g,'O').replace(/[ŪŬÚÙÛÜ]/g,'U').replace(/[ȲÝỲŶŸ]/g,'Y');}
    function normalisiere(t){return sineMacris(t).trim().toLowerCase().replace(/j/g,'i').replace(/v/g,'u');}
    function normalisiereModus(m){const s=normalisiere(m);if(['ind','indicativus','indicative'].includes(s))return'ind';if(['coni','conj','coniunctivus','conjunctivus','subi','subj','subiunctivus','subjunctivus'].includes(s))return'coni';if(['imp','imper','imperativus','imperative'].includes(s))return'imp';if(['inf','infinitivus','infinitive'].includes(s))return'inf';if(['part','participium','participialis','participle'].includes(s))return'part';if(['ger','gerundivum','gerundive'].includes(s))return'gerundivum';return s;}
    function estVocalis(c){return vocales.includes(c||'');}
    function estDiphthongus(t,i){const s=sineMacris(t).toLowerCase();const duo=s.slice(i,i+2);if(!diphthongi.includes(duo))return false;if((duo==='au'||duo==='eu')&&estVocalis(s[i+2]))return false;return true;}
    function indexUltimiVocalis(t){for(let i=String(t||'').length-1;i>=0;i-=1){if(estVocalis(t[i]))return i;}return-1;}
    function syllabaClausaEst(syllaba){const s=sineMacris(syllaba).toLowerCase();const i=indexUltimiVocalis(s);if(i<0)return false;return[...s.slice(i+1)].some(c=>!estVocalis(c));}
    function syllabaDiphthongoLongaEst(syllaba){const s=sineMacris(syllaba).toLowerCase();for(let i=0;i<s.length-1;i+=1){if(estDiphthongus(s,i))return true;}return false;}
    function syllabaMacronLongaEst(syllaba){return/[āēīōūȳĀĒĪŌŪȲ]/.test(String(syllaba||''));}
    function longaeIndices(forma){if(Array.isArray(forma?.longae))return forma.longae.map(Number).filter(n=>Number.isInteger(n));return String(forma?.longae||'').toUpperCase().replace(/[.\s-]/g,'').split('').map((s,i)=>s==='L'?i:null).filter(i=>i!==null);}
    function estQuU(textus,index){const s=String(textus||'').toLowerCase();return s[index]==='u'&&index>0&&s[index-1]==='q';}
    function estUConsonansIntervocalicum(s,i,contextus={}){const t=sineMacris(String(s||'')).toLowerCase();if(t[i]!=='u'||i!==0||!estVocalis(t[i+1]))return false;const p=sineMacris(String(contextus.praecedens||'')).toLowerCase();return Boolean(p&&estVocalis(p[p.length-1]));}
    function indexSignandiVocalis(t,contextus={}){const s=String(t||'');for(let i=0;i<s.length;i+=1){if(estQuU(s,i))continue;if(estUConsonansIntervocalicum(s,i,contextus))continue;if(s[i].toLowerCase()==='i'&&s[i+1]?.toLowerCase()==='a')continue;if(estVocalis(s[i]))return i;}return-1;}
    function notaLongaText(syllaba,contextus={}){const i=indexSignandiVocalis(syllaba,contextus);if(i<0)return syllaba;if(estDiphthongus(syllaba,i))return syllaba.slice(0,i)+syllaba[i]+'͞'+syllaba[i+1]+syllaba.slice(i+2);return syllaba.slice(0,i)+(longaeNotae[syllaba[i]]||syllaba[i])+syllaba.slice(i+1);}
    function notaLongaHtml(syllaba,contextus={}){const i=indexSignandiVocalis(syllaba,contextus);if(i<0)return escapeHtml(syllaba);if(estDiphthongus(syllaba,i))return escapeHtml(syllaba.slice(0,i))+`<span class="diphthongus">${escapeHtml(syllaba[i]+syllaba[i+1])}</span>`+escapeHtml(syllaba.slice(i+2));return escapeHtml(syllaba.slice(0,i)+(longaeNotae[syllaba[i]]||syllaba[i])+syllaba.slice(i+1));}
    function formaCorrecta(forma){const f={...forma};if(normalisiere(f.lemma||'').startsWith('lauini')||normalisiere(f.forma||'').startsWith('lauini')){const indices=new Set(longaeIndices(f));indices.add(0);indices.add(1);f.longae=[...indices].sort((a,b)=>a-b);}return f;}
    function longaeSiglaMetricae(forma){forma=formaCorrecta(forma);const syllabae=String(forma?.syllabae||'').split('.').filter(Boolean);const dataLongae=new Set(longaeIndices(forma));return syllabae.map((s,i)=>(dataLongae.has(i)||syllabaClausaEst(s)||syllabaDiphthongoLongaEst(s)||syllabaMacronLongaEst(s))?'L':'B').join('');}
    function longaeSiglaSignandae(forma){forma=formaCorrecta(forma);const syllabae=String(forma?.syllabae||'').split('.').filter(Boolean);const dataLongae=new Set(longaeIndices(forma));return syllabae.map((s,i)=>(dataLongae.has(i)||syllabaDiphthongoLongaEst(s)||syllabaMacronLongaEst(s))?'L':'B').join('');}
    function initialisMaiuscula(forma){return /^[A-ZĀĒĪŌŪȲ]/.test(String(forma?.lemma||lemmaDisplayActuale||lemma||''));}
    function formaSignata(forma){forma=formaCorrecta(forma);const syllabae=String(forma?.syllabae||'').split('.').filter(Boolean);const textus=syllabae.length?syllabae.map((s,i)=>longaeSiglaSignandae(forma)[i]==='L'?notaLongaText(s,{praecedens:syllabae[i-1]||''}):s).join(''):String(forma?.forma||forma?.lemma||'');return initialisMaiuscula(forma)&&textus?textus.charAt(0).toUpperCase()+textus.slice(1):textus;}
    function formaSignataHtml(forma){forma=formaCorrecta(forma);const syllabae=String(forma?.syllabae||'').split('.').filter(Boolean);let html=syllabae.length?syllabae.map((s,i)=>longaeSiglaSignandae(forma)[i]==='L'?notaLongaHtml(s,{praecedens:syllabae[i-1]||''}):escapeHtml(s)).join(''):escapeHtml(forma?.forma||forma?.lemma||'');if(initialisMaiuscula(forma)&&html)html=html.charAt(0).toUpperCase()+html.slice(1);return html;}
    function formaProLemmaHtml(forma){return formaSignataHtml(forma)||'—';}
    function breviaSyllabam(syllaba){return String(syllaba||'').replace(/[aeiouyAEIOUY]/,l=>breves[l]||l);}
    function estAblativusSingularisLongaeDeclinationis(forma){if(normalisiere(forma?.casus)!=='abl'||normalisiere(forma?.numerus)!=='sg')return false;return /[aoieu]$/.test(normalisiere(forma?.forma||''));}
    function syllabaNaturaliterLongaEst(forma,index){const syllabae=String(forma?.syllabae||'').split('.').filter(Boolean);const dataLongae=new Set(longaeIndices(forma));const syllaba=syllabae[index]||'';return dataLongae.has(index)||syllabaDiphthongoLongaEst(syllaba)||syllabaMacronLongaEst(syllaba);}
    function syllabaMetriceBrevisEst(forma,index){const syllabae=String(forma?.syllabae||'').split('.').filter(Boolean);const syllaba=syllabae[index]||'';return !syllabaNaturaliterLongaEst(forma,index)&&!syllabaClausaEst(syllaba);}
    function estIambusCorreptibilis(forma){const syllabae=String(forma?.syllabae||'').split('.').filter(Boolean);return syllabae.length===2&&syllabaMetriceBrevisEst(forma,0)&&syllabaNaturaliterLongaEst(forma,1)&&!estAblativusSingularisLongaeDeclinationis(forma);}
    function formaIambiceCorrepta(forma){const syllabae=String(forma?.syllabae||'').split('.').filter(Boolean);if(syllabae.length!==2)return'';return syllabae[0]+breviaSyllabam(syllabae[1]);}
    function istElidierbar(textus){const s=sineMacris(textus).toLowerCase().replace(/͞/g,'');return /[aeiouy]m?$/.test(s);}
    function siglaMitElision(sigla,textus){const s=String(sigla||'').toUpperCase().replace(/[^LB]/g,'');if(!s||s.length<2||!istElidierbar(textus))return s;return `${s.slice(0,-1)}(${s.slice(-1)})`;}
    function siglaBasis(sigla){return String(sigla||'').toUpperCase().replace(/\(([LB])\)\s*$/,'').replace(/[^LB]/g,'');}
    function istHexameterCompatibilis(sigla){const s=siglaBasis(sigla);if(!s)return false;if(s.includes('BBB'))return false;if(s.includes('LBL'))return false;return true;}
    function eligeFormamHeadword(formae){const lemmaNorm=normalisiere(lemma);return formae.find(f=>f.pars_orationis==='substantivum'&&f.casus==='nom'&&f.numerus==='sg')||formae.find(f=>f.pars_orationis==='substantivum'&&f.casus==='nom'&&f.numerus==='pl')||formae.find(f=>f.persona==='1'&&f.numerus==='sg'&&f.tempus==='praes'&&normalisiereModus(f.modus)==='ind'&&f.vox==='act')||formae.find(f=>normalisiere(f.forma)===lemmaNorm)||formae[0];}
    function formaSubstantiviHtml(formae,casus,numerus){const f=formae.find(x=>x.casus===casus&&x.numerus===numerus);return f?formaProLemmaHtml(f):'—';}
    function numeriSubstantivi(formae){const sg=formae.some(f=>f.numerus==='sg');const pl=formae.some(f=>f.numerus==='pl');if(sg&&pl)return['sg','pl'];if(pl)return['pl'];return['sg'];}
    function tabellaSubstantivi(formae){const wrapper=document.createElement('div');wrapper.className='flexio-wrapper';const table=document.createElement('table');table.className='flexio-tabelle substantivum-tabula';const numeri=numeriSubstantivi(formae);const thead=document.createElement('thead');const head=document.createElement('tr');['',...numeri.map(n=>n==='sg'?'Singularis':'Pluralis')].forEach(t=>{const th=document.createElement('th');th.textContent=t;head.appendChild(th);});thead.appendChild(head);table.appendChild(thead);const tbody=document.createElement('tbody');casusOrdines.forEach(casus=>{const tr=document.createElement('tr');const th=document.createElement('th');th.textContent=casusNomina[casus];tr.appendChild(th);numeri.forEach(numerus=>{const td=document.createElement('td');td.innerHTML=formaSubstantiviHtml(formae,casus,numerus);tr.appendChild(td);});tbody.appendChild(tr);});table.appendChild(tbody);wrapper.appendChild(table);return wrapper;}
    function formaNachMetaHtml(formae,casus,numerus,genus){const f=formae.find(x=>x.casus===casus&&x.numerus===numerus&&x.genus===genus);return f?formaProLemmaHtml(f):'—';}
    function tabellaAdiectiviNumeri(formae,numerus){const h=document.createElement('h3');h.className='flexio-numerus';h.textContent=numerus==='sg'?'Singularis':'Pluralis';const wrapper=document.createElement('div');wrapper.className='flexio-wrapper';const table=document.createElement('table');table.className='flexio-tabelle';const thead=document.createElement('thead');const head=document.createElement('tr');['','masculinum','femininum','neutrum'].forEach(t=>{const th=document.createElement('th');th.textContent=t;head.appendChild(th);});thead.appendChild(head);table.appendChild(thead);const tbody=document.createElement('tbody');casusOrdines.forEach(casus=>{const tr=document.createElement('tr');const th=document.createElement('th');th.textContent=casusNomina[casus];tr.appendChild(th);['m','f','n'].forEach(genus=>{const td=document.createElement('td');td.innerHTML=formaNachMetaHtml(formae,casus,numerus,genus);tr.appendChild(td);});tbody.appendChild(tr);});table.appendChild(tbody);wrapper.appendChild(table);return[h,wrapper];}
    function modusEst(x,modus){const m=normalisiereModus(x.modus);if(modus==='ind')return !m||m==='ind';return m===modus;}
    function formaVerbalisHtml(formae,persona,numerus,tempus,modus='ind'){const f=formae.find(x=>x.persona===persona&&x.numerus===numerus&&x.tempus===tempus&&modusEst(x,modus)&&(!x.vox||x.vox==='act'));return f?formaProLemmaHtml(f):'—';}

    function tabellaVerbi(formae){const wrapper=document.createElement('div');wrapper.className='flexio-wrapper';const table=document.createElement('table');table.className='flexio-tabelle verbum-tabula';const thead=document.createElement('thead');const head=document.createElement('tr');['',...personae.map(p=>p[2])].forEach(t=>{const th=document.createElement('th');th.textContent=t;head.appendChild(th);});thead.appendChild(head);table.appendChild(thead);const tbody=document.createElement('tbody');addeModusOrdinem(tbody,'Indicativus');addeVerbumOrdinem(tbody,formae,'Praesens','ind','praes');addeVerbumOrdinem(tbody,formae,'Imperfectum','ind','imperf');addeVerbumOrdinem(tbody,formae,'Futurum','ind','fut');addeVerbumOrdinem(tbody,formae,'Perfectum','ind','perf');addeVerbumOrdinem(tbody,formae,'Plusquamperfectum','ind','plqpf');addeVerbumOrdinem(tbody,formae,'Futurum exactum','ind','futperf');addeModusOrdinem(tbody,'Coniunctivus');addeVerbumOrdinem(tbody,formae,'Praesens','coni','praes');addeVerbumOrdinem(tbody,formae,'Imperfectum','coni','imperf');addeVerbumOrdinem(tbody,formae,'Perfectum','coni','perf');addeVerbumOrdinem(tbody,formae,'Plusquamperfectum','coni','plqpf');addeModusOrdinem(tbody,'Imperativus');addeVerbumOrdinem(tbody,formae,'Praesens','imp','praes');addeVerbumOrdinem(tbody,formae,'Futurum','imp','fut');addeModusOrdinem(tbody,'Infinitiuus');addeNonFinitumOrdinem(tbody,'Infinitiuus praesens',formaInfinitiviHtml(formae,'praes'));addeNonFinitumOrdinem(tbody,'Infinitiuus perfectus',formaInfinitiviHtml(formae,'perf'));addeNonFinitumOrdinem(tbody,'Infinitiuus futurus',formaInfinitiviHtml(formae,'fut'));addeNonFinitumOrdinem(tbody,'Participium praesens',formaParticipiiHtml(formae,'praes'));addeNonFinitumOrdinem(tbody,'Participium perfectum',formaParticipiiHtml(formae,'perf'));addeNonFinitumOrdinem(tbody,'Participium futurum',formaParticipiiHtml(formae,'fut'));addeNonFinitumOrdinem(tbody,'Gerundivum',formaGerundiviHtml(formae));table.appendChild(tbody);wrapper.appendChild(table);return wrapper;}
    function zeigeFlexio(formae){const ziel=document.getElementById('lemmaFlexio');ziel.innerHTML='';if(!formae.length){ziel.textContent='Nullae formae inventae sunt.';return;}const pars=formae[0]?.pars_orationis;if(pars==='substantivum'||pars==='subst'){ziel.appendChild(tabellaSubstantivi(formae));return;}if(pars==='verbum'||pars==='verb'){ziel.appendChild(tabellaVerbi(formae));return;}tabellaAdiectiviNumeri(formae,'sg').forEach(el=>ziel.appendChild(el));tabellaAdiectiviNumeri(formae,'pl').forEach(el=>ziel.appendChild(el));}
    function zeigeFormaeMetricae(formae){const ziel=document.getElementById('lemmaFormae');ziel.innerHTML='';if(!formae.length){ziel.textContent='—';return;}const lista=document.createElement('div');lista.className='formae-lista';const visa=new Set();formae.forEach(forma=>{if(String(forma?.forma||'').trim().includes(' '))return;if(!String(forma?.syllabae||'').split('.').filter(Boolean).length)return;forma=formaCorrecta(forma);const siglaRoh=longaeSiglaMetricae(forma);const textus=formaSignata(forma);const sigla=siglaMitElision(siglaRoh,textus);const clavis=[textus,forma.syllabae,sigla].join('|');if(visa.has(clavis))return;visa.add(clavis);const card=document.createElement('div');card.className='forma-card '+(istHexameterCompatibilis(sigla)?'forma-metrice-bona':'forma-metrice-dubia');const prima=document.createElement('div');prima.className='forma-prima';prima.innerHTML=formaProLemmaHtml(forma);card.appendChild(prima);const meta=document.createElement('div');meta.className='forma-meta';meta.textContent=[forma.syllabae,sigla?`longae: ${sigla}`:''].filter(Boolean).join(' · ');card.appendChild(meta);if(estIambusCorreptibilis(forma)){const varians=document.createElement('span');varians.className='forma-variante';varians.textContent=`iambice: ${formaIambiceCorrepta(forma)}`;card.appendChild(varians);}lista.appendChild(card);});ziel.appendChild(lista);}
    async function lemmaExLexemeId(){if(lemma||!lexemeId)return;const{data,error}=await supabase.from('formae').select('lemma').eq('lexeme_id',lexemeId).limit(1);if(!error&&data&&data[0]?.lemma){lemma=data[0].lemma;lemmaDisplayActuale=lemma;}}
    async function ladeLemma(){await lemmaExLexemeId();if(!lemma&&!lexemeId)return;const lemmaNormal=normalisiere(lemma);document.getElementById('lemmaTitulus').textContent=lemma||'—';lemmaQuaere.value=lemma||'';const basis=supabase.from('formae').select('forma, lemma, pars_orationis, genus, numerus, casus, persona, tempus, modus, vox, syllabae, longae, lexeme_id');const query=lexemeId?basis.eq('lexeme_id',lexemeId):basis.ilike('lemma',lemmaNormal);const{data,error}=await query.order('forma',{ascending:true});if(error){document.getElementById('lemmaFlexio').textContent=error.message;return;}const formae=(data||[]).map(formaCorrecta);const headword=eligeFormamHeadword(formae);if(headword){lemmaDisplayActuale=headword.lemma||lemma;document.getElementById('lemmaTitulus').innerHTML=formaProLemmaHtml({...headword,forma:lemmaDisplayActuale});document.getElementById('lemmaPars').textContent=headword.pars_orationis||'—';}zeigeFlexio(formae);zeigeFormaeMetricae(formae);}
    lemmaQuaere.addEventListener('keydown',e=>{if(e.key!=='Enter')return;e.preventDefault();const q=lemmaQuaere.value.trim();if(!q)return;window.location.href=`index.html?tab=vocabularium&q=${encodeURIComponent(q)}`;});
    ladeLemma();
  </script>
