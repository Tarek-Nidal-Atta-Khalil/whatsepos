<!DOCTYPE html>
<html lang="la">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whatsepos</title>

  <style>
    body { font-family: Arial, sans-serif; margin: 0; text-align: center; }
    .container { width: calc(100% - 10cm); max-width: 1200px; margin: 40px auto; }
    .tabs { margin-bottom: 30px; }
    .tabs button, button { font-size: 20px; padding: 10px 20px; margin: 5px; cursor: pointer; }
    input { font-size: 20px; padding: 10px; margin: 5px; width: min(100%, 320px); box-sizing: border-box; }
    textarea { width: 100%; min-height: 300px; font-size: 24px; padding: 20px; box-sizing: border-box; resize: vertical; }
    #nuntii, #meineTexteListe { margin-top: 30px; text-align: left; }
    .nuntius { padding: 10px; margin-bottom: 10px; border-bottom: 1px solid #ccc; font-size: 24px; white-space: pre-wrap; }
    .status { min-height: 1.5em; margin-top: 10px; }
  </style>
</head>

<body>
  <div class="container">
    <h1>Scriptorium</h1>

    <div class="tabs">
      <button onclick="zeigeTab('login')">Anmeldung</button>
      <button onclick="zeigeTab('register')">Registrierung</button>
      <button onclick="zeigeTab('hexameter')">Hexameter</button>
      <button onclick="zeigeTab('meineTexte')">Meine Texte</button>
    </div>

    <div id="login" class="tab-content">
      <input id="login_identifier" type="text" placeholder="Benutzername oder E-Mail">
      <input id="login_password" type="password" placeholder="Passwort">
      <br>
      <button onclick="einloggen()">Einloggen</button>
      <p id="login_status" class="status"></p>
    </div>

    <div id="register" class="tab-content" style="display: none;">
      <input id="register_username" type="text" placeholder="Benutzername">
      <input id="register_email" type="email" placeholder="E-Mail">
      <input id="register_password" type="password" placeholder="Passwort">
      <br>
      <button onclick="registrieren()">Konto erstellen</button>
      <p id="register_status" class="status"></p>
    </div>

    <div id="hexameter" class="tab-content" style="display: none;">
      <button onclick="ausloggen()">Ausloggen</button>
      <p id="status" class="status"></p>
      <textarea id="campus" placeholder="Hic scribe et preme Enter..."></textarea>
      <div id="nuntii"></div>
    </div>

    <div id="meineTexte" class="tab-content" style="display: none;">
      <h2>Meine Texte</h2>
      <button onclick="ladeVerse()">Aktualisieren</button>
      <div id="meineTexteListe"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://sdjhpovsechtfdwwakmm.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkamhwb3ZzZWNodGZkd3dha21tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjIyNTIsImV4cCI6MjA5NDMzODI1Mn0.cyWJGEdA84bGAKyBcNYAXtJBLcf9Lo12oYn5CEAPhf4"
    );

    const campus = document.getElementById("campus");
    const nuntii = document.getElementById("nuntii");
    const meineTexteListe = document.getElementById("meineTexteListe");

    let aktuellerUser = null;

    window.zeigeTab = function (tabName) {
      document.getElementById("login").style.display = "none";
      document.getElementById("register").style.display = "none";
      document.getElementById("hexameter").style.display = "none";
      document.getElementById("meineTexte").style.display = "none";
      document.getElementById(tabName).style.display = "block";
    };

    campus.addEventListener("keydown", function (event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        speichereVers();
      }
    });

    function zeigeVers(textus) {
      const div = document.createElement("div");
      div.className = "nuntius";
      div.textContent = textus;
      nuntii.appendChild(div);
    }

    function zeigeEigenenText(id, textus) {
  const div = document.createElement("div");
  div.className = "nuntius";

  const textarea = document.createElement("textarea");
  textarea.value = textus;
  textarea.style.minHeight = "120px";

  const saveButton = document.createElement("button");
  saveButton.textContent = "Speichern";
  saveButton.onclick = function () {
    bearbeiteVers(id, textarea.value);
  };

  const deleteButton = document.createElement("button");
  deleteButton.textContent = "Löschen";
  deleteButton.onclick = function () {
    loescheVers(id);
  };

  div.appendChild(textarea);
  div.appendChild(document.createElement("br"));
  div.appendChild(saveButton);
  div.appendChild(deleteButton);

  meineTexteListe.appendChild(div);
}

    window.bearbeiteVers = async function (id, neuerText) {
  if (!aktuellerUser) {
    document.getElementById("status").textContent =
      "Bitte zuerst einloggen.";
    return;
  }

  if (neuerText.trim() === "") {
    document.getElementById("status").textContent =
      "Der Text darf nicht leer sein.";
    return;
  }

  const { error } = await supabase
    .from("versus")
    .update({ textus: neuerText.trim() })
    .eq("id", id)
    .eq("user_id", aktuellerUser.id);

  if (error) {
    document.getElementById("status").textContent = error.message;
    return;
  }

  document.getElementById("status").textContent = "Vers bearbeitet.";
  await ladeVerse();
};

    window.loescheVers = async function (id) {
  if (!aktuellerUser) {
    document.getElementById("status").textContent =
      "Bitte zuerst einloggen.";
    return;
  }

  const { error } = await supabase
    .from("versus")
    .delete()
    .eq("id", id)
    .eq("user_id", aktuellerUser.id);

  if (error) {
    document.getElementById("status").textContent = error.message;
    return;
  }

  document.getElementById("status").textContent = "Vers gelöscht.";

  await ladeVerse();
};

    window.ladeVerse = async function () {
  nuntii.innerHTML = "";
  meineTexteListe.innerHTML = "";

  if (!aktuellerUser) {
    document.getElementById("status").textContent =
      "Bitte zuerst einloggen.";
    return;
  }

  const { data, error } = await supabase
    .from("versus")
    .select("id, textus, created_at")
    .eq("user_id", aktuellerUser.id)
    .order("created_at", { ascending: true });

  if (error) {
    document.getElementById("status").textContent = error.message;
    return;
  }

data.forEach(vers => {
    zeigeVers(vers.textus);
    zeigeEigenenText(vers.id, vers.textus);
  });
};

    async function speichereVers() {
      const textus = campus.value.trim();
      if (textus === "") return;

      if (!aktuellerUser) {
        document.getElementById("status").textContent =
          "Bitte zuerst einloggen.";
        return;
      }

      const { error } = await supabase
        .from("versus")
        .insert({
          user_id: aktuellerUser.id,
          textus: textus
        });

      if (error) {
        document.getElementById("status").textContent = error.message;
        return;
      }

      zeigeVers(textus);
      zeigeEigenenText(textus);
      campus.value = "";
      document.getElementById("status").textContent = "Vers gespeichert.";
    }

    window.registrieren = async function () {
      const username = document.getElementById("register_username").value.trim();
      const email = document.getElementById("register_email").value.trim();
      const password = document.getElementById("register_password").value;

      if (username === "") {
        document.getElementById("register_status").textContent =
          "Bitte Benutzernamen eingeben.";
        return;
      }

      const { data, error } = await supabase.auth.signUp({ email, password });

      if (error) {
        document.getElementById("register_status").textContent = error.message;
        return;
      }

      const user = data.user;

      if (!user) {
        document.getElementById("register_status").textContent =
          "Konto erstellt. Bitte bestätige ggf. deine E-Mail.";
        return;
      }

      const { error: profileError } = await supabase
        .from("profiles")
        .insert({
          id: user.id,
          username: username
        });

      document.getElementById("register_status").textContent =
        profileError ? profileError.message : "Konto erfolgreich erstellt.";
    };

    window.einloggen = async function () {
      const identifier = document.getElementById("login_identifier").value.trim();
      const password = document.getElementById("login_password").value;

      if (identifier === "") {
        document.getElementById("login_status").textContent =
          "Bitte Benutzername oder E-Mail eingeben.";
        return;
      }

      if (!identifier.includes("@")) {
        document.getElementById("login_status").textContent =
          "Bitte vorerst mit E-Mail-Adresse anmelden.";
        return;
      }

      const { data, error } = await supabase.auth.signInWithPassword({
        email: identifier,
        password: password
      });

      if (error) {
        document.getElementById("login_status").textContent = error.message;
        return;
      }

      aktuellerUser = data.user;
      document.getElementById("login_status").textContent = "Eingeloggt.";
      document.getElementById("status").textContent = "Eingeloggt.";

      await ladeVerse();
      zeigeTab("hexameter");
    };

    window.ausloggen = async function () {
      await supabase.auth.signOut();

      aktuellerUser = null;
      nuntii.innerHTML = "";
      meineTexteListe.innerHTML = "";
      campus.value = "";

      document.getElementById("status").textContent = "Ausgeloggt.";
      zeigeTab("login");
    };

    async function pruefeSitzung() {
      const { data } = await supabase.auth.getSession();

      if (data.session && data.session.user) {
        aktuellerUser = data.session.user;

        document.getElementById("status").textContent = "Eingeloggt.";
        document.getElementById("login_status").textContent = "Bereits eingeloggt.";

        await ladeVerse();
        zeigeTab("hexameter");
      }
    }

    pruefeSitzung();
  </script>
</body>
</html>
