<!DOCTYPE html>
<html lang="la">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whatsepos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      text-align: center;
    }

    .container {
      width: calc(100% - 10cm);
      max-width: 1200px;
      margin: 40px auto;
    }

    .tabs {
      margin-bottom: 30px;
    }

    .tabs button,
    button {
      font-size: 20px;
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
    }

    input,
    textarea {
      font-size: 20px;
      padding: 10px;
      box-sizing: border-box;
    }

    input {
      margin: 5px;
      width: min(100%, 320px);
    }

    #poemTitle {
      width: min(100%, 600px);
      margin-bottom: 20px;
      text-align: center;
      font-size: 28px;
    }

    #poemArea {
      position: relative;
      height: calc(100vh - 220px);
    }

    #nuntii {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: calc(3cm + 56px + 20px);
      overflow-y: auto;
      text-align: center;
      padding-bottom: 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    #campus {
      position: fixed;
      bottom: 3cm;
      left: 50%;
      transform: translateX(-50%);
      right: 0;
      width: 100%;
      height: 56px;
      resize: none;
      text-align: center;
      font-size: 24px;
    }

    .nuntius {
      padding: 6px 0;
      font-size: 24px;
      white-space: pre-wrap;
    }

    .status {
      min-height: 1.5em;
      margin-top: 10px;
    }

    #meineTexteListe {
      margin-top: 30px;
      text-align: left;
    }

    .poem-item {
      border-bottom: 1px solid #ccc;
      padding: 12px 0;
    }

    .poem-item strong {
      font-size: 24px;
    }

    #menuButton {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1001;
    }
    
    .side-menu {
      position: fixed;
      top: 0;
      left: -260px;
      width: 240px;
      height: 100vh;
      background: white;
      border-right: 1px solid #ccc;
      padding-top: 80px;
      transition: left 0.3s ease;
      z-index: 1000;
    }
    
    .side-menu.open {
      left: 0;
    }
    
    .side-menu button {
      display: block;
      width: 200px;
      margin: 10px auto;
      text-align: left;
    }

    #logoutButton {
      position: absolute;
      left: 20px;
      bottom: 80px;
      width: 200px;
      text-align: left;
    }

    h1 {
      position: fixed;
      top: 20px;
      right: 20px;
      margin: 0;
      font-size: 32px;
      z-index: 1001;
      background: white;
      padding: 5px 10px;
    }

    .auth-bottom {
      position: absolute;
      left: 20px;
      bottom: 20px;
      width: 200px;
    }
    
    .auth-bottom button {
      display: block;
      width: 200px;
      margin: 10px 0;
      text-align: left;
    }
    
  </style>
</head>
<body>
  <div class="container">
    <h1>Scriptorium</h1>

  <button id="menuButton" onclick="toggleMenu()">☰ Menü</button>

  <div id="sideMenu" class="side-menu">
  <button onclick="zeigeTab('hexameter')">Hexameter</button>
  <button onclick="zeigeTab('meineTexte')">Meine Texte</button>

  <div id="authLoggedOut" class="auth-bottom">
    <button onclick="zeigeTab('login')">Anmeldung</button>
    <button onclick="zeigeTab('register')">Registrierung</button>
  </div>

  <div id="authLoggedIn" class="auth-bottom" style="display: none;">
    <button onclick="ausloggen()">Ausloggen</button>
  </div>
</div>
      

    <!-- Anmeldung -->
    <div id="login" class="tab-content">
      <input id="login_identifier" type="text" placeholder="Benutzername oder E-Mail">
      <input id="login_password" type="password" placeholder="Passwort">
      <br>
      <button onclick="einloggen()">Einloggen</button>
      <p id="login_status" class="status"></p>
    </div>

    <!-- Registrierung -->
    <div id="register" class="tab-content" style="display: none;">
      <input id="register_username" type="text" placeholder="Benutzername">
      <input id="register_email" type="email" placeholder="E-Mail">
      <input id="register_password" type="password" placeholder="Passwort">
      <br>
      <button onclick="registrieren()">Konto erstellen</button>
      <p id="register_status" class="status"></p>
    </div>

    <!-- Hexameter -->
    <div id="hexameter" class="tab-content" style="display: none;">
      <p id="status" class="status"></p>

      <input id="poemTitle" type="text" placeholder="Titel des Gedichts">
      <br>
      <button onclick="neuesGedicht()">Neues Gedicht anlegen</button>

      <div id="poemArea">
        <div id="nuntii"></div>
        <textarea
          id="campus"
          rows="1"
          placeholder="Vers schreiben und Enter drücken..."
        ></textarea>
      </div>
    </div>

    <!-- Meine Texte -->
    <div id="meineTexte" class="tab-content" style="display: none;">
      <h2>Meine Texte</h2>
      <button onclick="ladeGedichtsliste()">Aktualisieren</button>
      <div id="meineTexteListe"></div>
    </div>
  </div>

  <script type="module">
  window.toggleMenu = function () {
    document.getElementById("sideMenu").classList.toggle("open");
  };

  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://sdjhpovsechtfdwwakmm.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkamhwb3ZzZWNodGZkd3dha21tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjIyNTIsImV4cCI6MjA5NDMzODI1Mn0.cyWJGEdA84bGAKyBcNYAXtJBLcf9Lo12oYn5CEAPhf4"
    );

    const campus = document.getElementById("campus");
    const nuntii = document.getElementById("nuntii");
    const poemTitle = document.getElementById("poemTitle");
    const meineTexteListe = document.getElementById("meineTexteListe");

    let aktuellerUser = null;
    let aktuellesGedicht = null;
    
    // Tabs
    window.zeigeTab = function(tabName) {
      ["login", "register", "hexameter", "meineTexte"].forEach(id => {
        document.getElementById(id).style.display = "none";
      });
      document.getElementById(tabName).style.display = "block";
      document.getElementById("sideMenu").classList.remove("open");

      if (tabName === "meineTexte") {
        ladeGedichtsliste();
      }
    };

    // Vers eingeben
    campus.addEventListener("keydown", async function(event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        await fuegeVersHinzu();
      }
    });

    function zeigeGedicht(textus) {
      nuntii.innerHTML = "";
      if (!textus) return;

      textus.split("\n").forEach(vers => {
        const div = document.createElement("div");
        div.className = "nuntius";
        div.textContent = vers;
        nuntii.appendChild(div);
      });

      nuntii.scrollTop = nuntii.scrollHeight;
    }

    // Neues Gedicht
    window.neuesGedicht = async function() {
      const titulus = poemTitle.value.trim();

      if (!aktuellerUser) {
        setStatus("Bitte zuerst einloggen.");
        return;
      }

      if (titulus === "") {
        setStatus("Bitte einen Titel eingeben.");
        return;
      }

      const { data, error } = await supabase
        .from("poemata")
        .insert({
          user_id: aktuellerUser.id,
          titulus,
          textus: ""
        })
        .select()
        .single();

      if (error) {
        setStatus(error.message);
        return;
      }

      aktuellesGedicht = data;
      nuntii.innerHTML = "";
      campus.value = "";
      setStatus("Gedicht angelegt.");
    };

    // Vers anhängen
    async function fuegeVersHinzu() {
      const vers = campus.value.trim();
      if (vers === "") return;

      if (!aktuellesGedicht) {
        setStatus("Bitte zuerst ein Gedicht anlegen oder öffnen.");
        return;
      }

      const neuerText = aktuellesGedicht.textus
        ? aktuellesGedicht.textus + "\n" + vers
        : vers;

      const { error } = await supabase
        .from("poemata")
        .update({
          textus: neuerText,
          updated_at: new Date().toISOString()
        })
        .eq("id", aktuellesGedicht.id)
        .eq("user_id", aktuellerUser.id);

      if (error) {
        setStatus(error.message);
        return;
      }

      aktuellesGedicht.textus = neuerText;
      zeigeGedicht(neuerText);
      campus.value = "";
      setStatus("Vers gespeichert.");
    }

    // Gedichtsliste
    window.ladeGedichtsliste = async function() {
      meineTexteListe.innerHTML = "";
      if (!aktuellerUser) return;

      const { data, error } = await supabase
        .from("poemata")
        .select("id, titulus, textus, updated_at")
        .eq("user_id", aktuellerUser.id)
        .order("updated_at", { ascending: false });

      if (error) {
        setStatus(error.message);
        return;
      }

      data.forEach(gedicht => {
        const div = document.createElement("div");
        div.className = "poem-item";

        const title = document.createElement("strong");
        title.textContent = gedicht.titulus;

        const openButton = document.createElement("button");
        openButton.textContent = "Öffnen";
        openButton.onclick = () => oeffneGedicht(gedicht);

        div.appendChild(title);
        div.appendChild(document.createTextNode(" "));
        div.appendChild(openButton);

        meineTexteListe.appendChild(div);
      });
    };

    function oeffneGedicht(gedicht) {
      aktuellesGedicht = gedicht;
      poemTitle.value = gedicht.titulus;
      zeigeGedicht(gedicht.textus);
      zeigeTab("hexameter");
      setStatus("Gedicht geöffnet.");
    }

    // Löschen
    window.loescheAktuellesGedicht = async function() {
      if (!aktuellesGedicht) {
        setStatus("Kein Gedicht ausgewählt.");
        return;
      }

      const bestaetigt = confirm("Dieses Gedicht wirklich löschen?");
      if (!bestaetigt) return;

      const { error } = await supabase
        .from("poemata")
        .delete()
        .eq("id", aktuellesGedicht.id)
        .eq("user_id", aktuellerUser.id);

      if (error) {
        setStatus(error.message);
        return;
      }

      aktuellesGedicht = null;
      poemTitle.value = "";
      nuntii.innerHTML = "";

      await ladeGedichtsliste();
      setStatus("Gedicht gelöscht.");
    };

    // Registrierung
    window.registrieren = async function() {
      const username = document.getElementById("register_username").value.trim();
      const email = document.getElementById("register_email").value.trim();
      const password = document.getElementById("register_password").value;

      if (username === "") {
        document.getElementById("register_status").textContent =
          "Bitte Benutzernamen eingeben.";
        return;
      }

      const { data, error } = await supabase.auth.signUp({ email, password });

      if (error) {
        document.getElementById("register_status").textContent = error.message;
        return;
      }

      if (data.user) {
        await supabase.from("profiles").insert({
          id: data.user.id,
          username
        });
      }

      document.getElementById("register_status").textContent =
        "Konto erfolgreich erstellt.";
    };

    // Anmeldung
    window.einloggen = async function() {
      const email = document.getElementById("login_identifier").value.trim();
      const password = document.getElementById("login_password").value;

      if (!email.includes("@")) {
        document.getElementById("login_status").textContent =
          "Bitte vorerst mit E-Mail-Adresse anmelden.";
        return;
      }

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        document.getElementById("login_status").textContent = error.message;
        return;
      }

      aktuellerUser = data.user;
      aktualisiereAuthMenu();
      document.getElementById("login_status").textContent = "Eingeloggt.";

      await ladeGedichtsliste();
      zeigeTab("hexameter");
      setStatus("Eingeloggt.");
    };

    // Ausloggen
    window.ausloggen = async function() {
      await supabase.auth.signOut();

      aktuellerUser = null;
      aktualisiereAuthMenu();
      aktuellesGedicht = null;

      poemTitle.value = "";
      campus.value = "";
      nuntii.innerHTML = "";
      meineTexteListe.innerHTML = "";

      zeigeTab("login");
      setStatus("Ausgeloggt.");
    };

    // Sitzung wiederherstellen
    async function pruefeSitzung() {
      const { data } = await supabase.auth.getSession();
    
      if (data.session?.user) {
        aktuellerUser = data.session.user;
        aktualisiereAuthMenu();
        await ladeGedichtsliste();
        zeigeTab("hexameter");
        setStatus("Bereits eingeloggt.");
      } else {
        aktuellerUser = null;
        aktualisiereAuthMenu();
        zeigeTab("login");
      }
    }

    function setStatus(text) {
      const status = document.getElementById("status");
      if (status) {
        status.textContent = text;
      }
    }

    //seitenleiste an logging-status anpassen
    function aktualisiereAuthMenu() {
      document.getElementById("authLoggedOut").style.display =
        aktuellerUser ? "none" : "block";
    
      document.getElementById("authLoggedIn").style.display =
        aktuellerUser ? "block" : "none";
    }

    pruefeSitzung();
  </script>
</body>
</html>
