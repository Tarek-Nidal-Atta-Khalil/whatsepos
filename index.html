<!DOCTYPE html>
<html lang="la">
<head>
    <meta charset="UTF-8">
    <title>Whatsepos</title>
</head>
<body>
    <h1>Salve ad Whatsepos!</h1>

    <!-- Campus textus -->
    <input
        type="text"
        id="campus"
        placeholder="Hic scribe..."
        oninput="renova()"
    >

    <!-- Hic nuntius monstrabitur -->
    <p id="nuntius">Nihil adhuc scriptum est.</p>

    <script>
        function renova() {
            const textus = document.getElementById("campus").value;
            document.getElementById("nuntius").textContent = textus;
        }
    </script>
</body>
</html>
