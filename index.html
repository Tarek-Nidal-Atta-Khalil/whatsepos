<!DOCTYPE html>
<html lang="la">
<head>
    <meta charset="UTF-8">
    <title>Whatsepos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Container mit 5 cm Abstand links und rechts */
        .container {
            width: calc(100% - 10cm);
            max-width: 1200px;
            margin: 40px auto;
        }

        /* Großes Eingabefeld */
        textarea {
            width: 100%;
            min-height: 300px;
            font-size: 24px;
            padding: 20px;
            box-sizing: border-box;
            resize: vertical;
        }

        /* Bereich für gespeicherte Nachrichten */
        #nuntii {
            margin-top: 30px;
            text-align: left;
        }

        /* Einzelne Nachricht */
        .nuntius {
            padding: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid #ccc;
            font-size: 24px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Scriptorium</h1>

        <textarea
            id="campus"
            placeholder="Hic scribe et preme Enter..."
        ></textarea>

        <div id="nuntii"></div>
    </div>

    <script>
        const campus = document.getElementById("campus");
        const nuntii = document.getElementById("nuntii");

        // Wenn Enter gedrückt wird, Nachricht speichern
        campus.addEventListener("keydown", function(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault(); // verhindert Zeilenumbruch
                addeNuntium();
            }
        });

        function addeNuntium() {
            const textus = campus.value.trim();

            if (textus === "") {
                return;
            }

            // Neues Element erzeugen
            const div = document.createElement("div");
            div.className = "nuntius";
            div.textContent = textus;

            // Unter die bisherigen Nachrichten setzen
            nuntii.appendChild(div);

            // Eingabefeld leeren
            campus.value = "";
        }
    </script>

</body>
</html>
