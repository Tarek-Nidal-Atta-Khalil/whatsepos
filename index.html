<!DOCTYPE html>
<html lang="la">
<head>
  <meta charset="UTF-8">
  <title>Whatsepos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      text-align: center;
    }

    .container {
      width: calc(100% - 10cm);
      max-width: 1200px;
      margin: 40px auto;
    }

    .tabs {
      margin-bottom: 30px;
    }

    .tabs button,
    button {
      font-size: 20px;
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
    }

    input {
      font-size: 20px;
      padding: 10px;
      margin: 5px;
    }

    textarea {
      width: 100%;
      min-height: 300px;
      font-size: 24px;
      padding: 20px;
      box-sizing: border-box;
      resize: vertical;
    }

    #nuntii {
      margin-top: 30px;
      text-align: left;
    }

    .nuntius {
      padding: 10px;
      margin-bottom: 10px;
      border-bottom: 1px solid #ccc;
      font-size: 24px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div class="container">
  <h1>Scriptorium</h1>

  <div class="tabs">
    <button onclick="zeigeTab('login')">Anmeldung</button>
    <button onclick="zeigeTab('register')">Registrierung</button>
    <button onclick="zeigeTab('hexameter')">Hexameter</button>
  </div>

  <!-- Anmeldung -->
  <div id="login" class="tab-content">
    <input
      id="login_identifier"
      type="text"
      placeholder="Benutzername oder E-Mail"
    >

    <input
      id="login_password"
      type="password"
      placeholder="Passwort"
    >

    <br>

    <button onclick="einloggen()">
      Einloggen
    </button>

    <p id="login_status"></p>
  </div>

  <!-- Registrierung -->
  <div id="register" class="tab-content" style="display: none;">
    <input
      id="register_username"
      type="text"
      placeholder="Benutzername"
    >

    <input
      id="register_email"
      type="email"
      placeholder="E-Mail"
    >

    <input
      id="register_password"
      type="password"
      placeholder="Passwort"
    >

    <br>

    <button onclick="registrieren()">
      Konto erstellen
    </button>

    <p id="register_status"></p>
  </div>

  <!-- Hexameter -->
  <div id="hexameter" class="tab-content" style="display: none;">
    <button onclick="ausloggen()">Ausloggen</button>
    <p id="status"></p>

    <textarea
      id="campus"
      placeholder="Hic scribe et preme Enter..."
    ></textarea>

    <div id="nuntii"></div>
  </div>
</div>

    <div id="hexameter" class="tab-content" style="display: none;">
      <textarea id="campus" placeholder="Hic scribe et preme Enter..."></textarea>
      <div id="nuntii"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://sdjhpovsechtfdwwakmm.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkamhwb3ZzZWNodGZkd3dha21tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjIyNTIsImV4cCI6MjA5NDMzODI1Mn0.cyWJGEdA84bGAKyBcNYAXtJBLcf9Lo12oYn5CEAPhf4"
    );

    const campus = document.getElementById("campus");
    const nuntii = document.getElementById("nuntii");

    window.zeigeTab = function(tabName) {
      document.getElementById("login").style.display = "none";
      document.getElementById("hexameter").style.display = "none";
      document.getElementById(tabName).style.display = "block";
    };

    campus.addEventListener("keydown", function(event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        addeNuntium();
      }
    });

    function addeNuntium() {
      const textus = campus.value.trim();

      if (textus === "") return;

      const div = document.createElement("div");
      div.className = "nuntius";
      div.textContent = textus;

      nuntii.appendChild(div);
      campus.value = "";
    }

    window.registrieren = async function () {
  const username = document.getElementById("register_username").value.trim();
  const email = document.getElementById("register_email").value;
  const password = document.getElementById("register_password").value;

  if (username === "") {
    document.getElementById("register_status").textContent =
      "Bitte Benutzernamen eingeben.";
    return;
  }

  const { data, error } = await supabase.auth.signUp({
    email,
    password
  });

  if (error) {
    document.getElementById("register_status").textContent =
      error.message;
    return;
  }

  const user = data.user;

  if (!user) {
    document.getElementById("register_status").textContent =
      "Konto erstellt. Bitte bestätige ggf. deine E-Mail.";
    return;
  }

  const { error: profileError } = await supabase
    .from("profiles")
    .insert({
      id: user.id,
      username
    });

  document.getElementById("register_status").textContent =
    profileError
      ? profileError.message
      : "Konto erfolgreich erstellt.";
};
    
    window.einloggen = async function () {
  const identifier =
    document.getElementById("login_identifier").value.trim();

  const password =
    document.getElementById("login_password").value;

  let email = identifier;

  // Wenn kein @ vorhanden ist, als Benutzername interpretieren
  if (!identifier.includes("@")) {
    const { data, error } = await supabase
      .from("profiles")
      .select("id")
      .eq("username", identifier)
      .single();

    if (error || !data) {
      document.getElementById("login_status").textContent =
        "Benutzername nicht gefunden.";
      return;
    }

    // E-Mail des Benutzers aus auth.users ist nicht direkt verfügbar.
    // Für den Login über Benutzername müsste zusätzlich die E-Mail
    // in der profiles-Tabelle gespeichert werden.
    document.getElementById("login_status").textContent =
      "Bitte vorerst mit E-Mail-Adresse anmelden.";
    return;
  }

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  document.getElementById("login_status").textContent =
    error ? error.message : "Eingeloggt.";
};
    
    window.ausloggen = async function () {
      await supabase.auth.signOut();
      document.getElementById("status").textContent = "Ausgeloggt.";
    };
  </script>
</body>
</html>
