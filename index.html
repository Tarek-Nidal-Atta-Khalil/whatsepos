<!DOCTYPE html>
<html lang="la">
<head>
    <meta charset="UTF-8">
    <title>Whatsepos</title>
</head>
<body>
    <h1>Scriptorium</h1>

    <!-- Campus textus -->
    <input type="text" id="campus" placeholder="Hic scribe...">

    <!-- Bulla -->
    <button onclick="addeNuntium()">Mitte</button>

    <!-- Hic nuntii congregabuntur -->
    <div id="nuntii"></div>

    <script>
        function addeNuntium() {
            const campus = document.getElementById("campus");
            const textus = campus.value;

            // Si nihil scriptum est, nihil fac
            if (textus.trim() === "") {
                return;
            }

            // Crea novum paragraphem
            const p = document.createElement("p");
            p.textContent = textus;

            // Appone ad div "nuntii"
            document.getElementById("nuntii").appendChild(p);

            // Campo evacuato
            campus.value = "";
        }
    </script>
</body>
</html>
