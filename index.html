<!DOCTYPE html>
<html lang="la">
<head>
    <meta charset="UTF-8">
    <title>Whatsepos</title>

    <style>
        /* Totam paginam centrat */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Container qui semper 5 cm a marginibus abest */
        .container {
            width: calc(100% - 10cm); /* 5 cm sinistra + 5 cm dextra */
            max-width: 1200px;        /* ne nimis late extendatur */
            margin: 40px auto;        /* auto = centrum horizontale */
        }

        /* Magna area scribendi */
        textarea {
            width: 100%;              /* totam latitudinem containeris occupat */
            min-height: 300px;        /* satis alta */
            font-size: 24px;          /* litterae maiores */
            padding: 20px;
            box-sizing: border-box;   /* padding in latitudine computatur */
            resize: vertical;         /* usor altitudinem mutare potest */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Scriptorium</h1>

        <textarea placeholder="Hic scribe..."></textarea>
    </div>

</body>
</html>
