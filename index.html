<!DOCTYPE html>
<html lang="la">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whatsepos</title>

  <link rel="stylesheet" href="style.css?v=20260601-tooltips-2">
</head>
  
<body>
  <div class="container">
    <h1 id="siteTitle">Scriptorium</h1>

  <button id="menuButton" type="button" onclick="toggleMenu()">☰ Menü</button>

  <div id="sideMenu" class="side-menu">
  <button onclick="zeigeTab('meineTexte')">Mei textus</button>
  <button onclick="zeigeTab('lectorium')">Lectorium</button>
  <button onclick="zeigeTab('vocabularium')">Vocabularium</button>
  <button onclick="zeigeTab('veroeffentlichungen')">Bibliotheca</button>
  <button onclick="zeigeTab('profil')">Persona</button>
    
  <div id="authLoggedOut" class="auth-bottom">
    <button onclick="zeigeTab('login')">Ingressus</button>
    <button onclick="zeigeTab('register')">Registratio</button>
  </div>

  <div id="authLoggedIn" class="auth-bottom" style="display: none;">
    <button onclick="ausloggen()">Exire</button>
  </div>
</div>

    <div id="login" class="tab-content">
      <div class="auth-startseite">
        <section class="auth-karte auth-login-karte">
          <h2>Ingredere</h2>
          <p class="auth-hinweis">Ingredere et carmina tua perge scribere.</p>
          <input id="login_identifier" type="text" placeholder="Nomen usoris aut inscriptio electronica">
          <input id="login_password" type="password" placeholder="Tessera">
          <button class="auth-primary" onclick="einloggen()">Ingredi</button>
          <p id="login_status" class="status"></p>
        </section>

        <section class="auth-karte auth-register-karte">
          <h2>Incipe</h2>
          <p>Nondum rationem habes?</p>
          <button class="auth-cta" onclick="zeigeTab('register')">Registrari</button>
          <p class="auth-hinweis">Rationem crea et primum carmen incipe.</p>
        </section>
      </div>
    </div>

    <div id="register" class="tab-content" style="display: none;">
      <div class="auth-startseite register-startseite">
        <section class="auth-karte auth-register-formular">
          <h2>Registratio</h2>
          <input id="register_username" type="text" placeholder="Nomen usoris">
          <input id="register_email" type="email" placeholder="Inscriptio electronica">
          <input id="register_password" type="password" placeholder="Tessera">
          <button class="auth-cta" onclick="registrieren()">Rationem creare</button>
          <button class="auth-secondary" onclick="zeigeTab('login')">Ad ingressum</button>
          <p id="register_status" class="status"></p>
        </section>
      </div>
    </div>

    <div id="hexameter" class="tab-content" style="display: none;">
      <p id="status" class="status"></p>

      <div id="scriptoriumStart"></div>

      <div id="titelEingabeBereich" style="display: none;">
        <input id="titelEingabe" type="text" placeholder="Titulum insere">
      </div>

      <div id="arbeitsbereich" style="display: none;">
        <h2 id="aktuellerTitel"></h2>

        <div id="scriptoriumLayout">
          <div id="poemArea">
            <div id="nuntii"></div>
            <div id="hexameterVorschau" aria-live="polite"></div>
            <textarea id="campus" rows="1" placeholder="Versum scribe et Enter preme..."></textarea>
          </div>

          <aside id="suggestionesMetricae">
            <h3>Suggestiones</h3>
            <div id="suggestionesMetricaeLista"></div>
          </aside>
        </div>
      </div>
    </div>

    <div id="meineTexte" class="tab-content" style="display: none;">
      <h2>Mei textus</h2>

      <div style="margin-bottom: 1.5rem;">
        <button onclick="zeigeTab('hexameter'); starteNeuesGedicht();">Novum carmen</button>
      </div>

      <div id="meineTexteKopf" class="titel-kopfzeile">
        <span></span>
        <span class="titel-spalte">Titulus</span>
        <span class="datum-spalte">coepi</span>
        <span class="datum-spalte">mutavi</span>
        <span></span>
      </div>

      <div id="meineTexteListe"></div>
    </div>

    <div id="lectorium" class="tab-content" style="display: none;">
      <section class="lectorium-card">
        <header class="lectorium-header">
          <p class="lectorium-auctor">Vergilius</p>
          <h2>Aeneis</h2>
          <p class="lectorium-locus">Liber I · versus 1–11</p>
        </header>

        <p id="lectoriumStatus" class="status"></p>
    
        <div id="lectoriumVersus" class="lectorium-versus"></div>
      </section>
    </div>
    
    <div id="vocabularium" class="tab-content" style="display: none;">
      <input id="vocabulariumQuaere" type="search" placeholder="Verbum Latinum quaere">
      <p id="vocabulariumStatus" class="status"></p>
      <div id="vocabulariumEventus"></div>
    </div>

    <div id="veroeffentlichungen" class="tab-content" style="display: none;">
      <h2>Bibliotheca</h2>
      <div id="veroeffentlichungenListe"></div>
    </div>

    <div id="profil" class="tab-content" style="display: none;">
      <h2>Persona</h2>

      <input id="profilUsername" type="text" placeholder="Nomen usoris">

      <br>

      <button onclick="speichereProfil()">Nomen usoris servare</button>

      <p id="profil_status" class="status"></p>
    </div>
  </div>

  <script
    type="module"
    src="app.js?v=20260601-lectorium-1"
  ></script>
  <script type="module" src="vocabularium.js?v=20260601-tooltips-1"></script>
  <script type="module" src="flexio.js?v=20260524-ao-1"></script>
  <script type="module" src="vocabularium_direct_search.js?v=20260601-enclitica-1"></script>
  <script type="module" src="vocabularium_declinationes.js"></script>
  <script src="vocabularium_enter_fix.js"></script>
    <script
    type="module"
    src="lectorium.js?v=20260601-orthographia-1"
  ></script>
  <script
    type="module"
    src="lectorium_tooltips.js?v=20260601-tooltips-2"
  ></script>
  <script src="publications.js"></script>
</body>
</html>
