<!DOCTYPE html>
<html lang="la">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whatsepos</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Scriptorium</h1>

  <button id="menuButton" type="button" onclick="toggleMenu()">☰ Menü</button>

  <div id="sideMenu" class="side-menu">
  <button onclick="zeigeTab('hexameter')">Hexameter</button>
  <button onclick="zeigeTab('meineTexte')">Meine Texte</button>
  <button onclick="zeigeTab('veroeffentlichungen')">Bibliotheca</button>
  <button onclick="zeigeTab('profil')">Profil</button>

  <div id="authLoggedOut" class="auth-bottom">
    <button onclick="zeigeTab('login')">Anmeldung</button>
    <button onclick="zeigeTab('register')">Registrierung</button>
  </div>

  <div id="authLoggedIn" class="auth-bottom" style="display: none;">
    <button onclick="ausloggen()">Ausloggen</button>
  </div>
</div>

    <div id="login" class="tab-content">
      <div class="auth-startseite">
        <section class="auth-karte auth-login-karte">
          <h2>Ingredere</h2>
          <p class="auth-hinweis">Melde dich direkt an und schreibe weiter.</p>
          <input id="login_identifier" type="text" placeholder="Benutzername oder E-Mail">
          <input id="login_password" type="password" placeholder="Passwort">
          <button class="auth-primary" onclick="einloggen()">Einloggen</button>
          <p id="login_status" class="status"></p>
        </section>

        <section class="auth-karte auth-register-karte">
          <h2>Incipe</h2>
          <p>Du hast noch kein Konto?</p>
          <button class="auth-cta" onclick="zeigeTab('register')">Registrieren</button>
          <p class="auth-hinweis">Erstelle ein Konto und beginne dein erstes Gedicht.</p>
        </section>
      </div>
    </div>

    <div id="register" class="tab-content" style="display: none;">
      <div class="auth-startseite register-startseite">
        <section class="auth-karte auth-register-formular">
          <h2>Registrierung</h2>
          <input id="register_username" type="text" placeholder="Benutzername">
          <input id="register_email" type="email" placeholder="E-Mail">
          <input id="register_password" type="password" placeholder="Passwort">
          <button class="auth-cta" onclick="registrieren()">Konto erstellen</button>
          <button class="auth-secondary" onclick="zeigeTab('login')">Zur Anmeldung</button>
          <p id="register_status" class="status"></p>
        </section>
      </div>
    </div>

    <div id="hexameter" class="tab-content" style="display: none;">
      <p id="status" class="status"></p>

      <div id="scriptoriumStart">
        <button onclick="starteNeuesGedicht()">Neues Gedicht</button>
      </div>

      <div id="titelEingabeBereich" style="display: none;">
        <input id="titelEingabe" type="text" placeholder="Titel eingeben">
      </div>

      <div id="arbeitsbereich" style="display: none;">
        <h2 id="aktuellerTitel"></h2>

        <div id="poemArea">
          <div id="nuntii"></div>
          <textarea id="campus" rows="1" placeholder="Vers schreiben und Enter drücken..."></textarea>
        </div>
      </div>
    </div>

    <div id="meineTexte" class="tab-content" style="display: none;">
      <h2>Meine Texte</h2>

      <div id="meineTexteKopf" class="titel-kopfzeile">
        <span></span>
        <span class="titel-spalte">Titulus</span>
        <span class="datum-spalte">coepi</span>
        <span class="datum-spalte">mutavi</span>
        <span></span>
      </div>

      <div id="meineTexteListe"></div>
    </div>

    <div id="veroeffentlichungen" class="tab-content" style="display: none;">
      <h2>Bibliotheca</h2>
      <div id="veroeffentlichungenListe"></div>
    </div>

    <div id="profil" class="tab-content" style="display: none;">
      <h2>Profil</h2>

      <input id="profilUsername" type="text" placeholder="Benutzername">

      <br>

      <button onclick="speichereProfil()">Benutzernamen speichern</button>

      <p id="profil_status" class="status"></p>
    </div>
  </div>

  <script type="module" src="app.js"></script>
  <script src="publications.js"></script>
</body>
</html>
