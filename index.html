<!DOCTYPE html>
<html lang="la">
<head>
  <meta charset="UTF-8">
  <title>Whatsepos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      text-align: center;
    }

    .container {
      width: calc(100% - 10cm);
      max-width: 1200px;
      margin: 40px auto;
    }

    .tabs {
      margin-bottom: 30px;
    }

    .tabs button,
    button {
      font-size: 20px;
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
    }

    input {
      font-size: 20px;
      padding: 10px;
      margin: 5px;
    }

    textarea {
      width: 100%;
      min-height: 300px;
      font-size: 24px;
      padding: 20px;
      box-sizing: border-box;
      resize: vertical;
    }

    #nuntii {
      margin-top: 30px;
      text-align: left;
    }

    .nuntius {
      padding: 10px;
      margin-bottom: 10px;
      border-bottom: 1px solid #ccc;
      font-size: 24px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Scriptorium</h1>

    <div class="tabs">
      <button onclick="zeigeTab('login')">Anmeldung</button>
      <button onclick="zeigeTab('hexameter')">Hexameter</button>
    </div>

    <div id="login" class="tab-content">
      <input id="email" type="email" placeholder="E-Mail">
      <input id="password" type="password" placeholder="Passwort">

      <br>

      <button onclick="registrieren()">Konto erstellen</button>
      <button onclick="einloggen()">Einloggen</button>
      <button onclick="ausloggen()">Ausloggen</button>

      <p id="status"></p>
    </div>

    <div id="hexameter" class="tab-content" style="display: none;">
      <textarea id="campus" placeholder="Hic scribe et preme Enter..."></textarea>
      <div id="nuntii"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://sdjhpovsechtfdwwakmm.supabase.co",
      "DEIN_ANON_PUBLIC_KEY_HIER_EINFÜGEN"
    );

    const campus = document.getElementById("campus");
    const nuntii = document.getElementById("nuntii");

    window.zeigeTab = function(tabName) {
      document.getElementById("login").style.display = "none";
      document.getElementById("hexameter").style.display = "none";
      document.getElementById(tabName).style.display = "block";
    };

    campus.addEventListener("keydown", function(event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        addeNuntium();
      }
    });

    function addeNuntium() {
      const textus = campus.value.trim();

      if (textus === "") return;

      const div = document.createElement("div");
      div.className = "nuntius";
      div.textContent = textus;

      nuntii.appendChild(div);
      campus.value = "";
    }

    window.registrieren = async function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signUp({ email, password });

      document.getElementById("status").textContent =
        error ? error.message : "Konto erstellt.";
    };

    window.einloggen = async function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      document.getElementById("status").textContent =
        error ? error.message : "Eingeloggt.";
    };

    window.ausloggen = async function () {
      await supabase.auth.signOut();
      document.getElementById("status").textContent = "Ausgeloggt.";
    };
  </script>
</body>
</html>
